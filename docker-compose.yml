version: '3.8'

services:

  # ── Database MySQL ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: jplatform-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword      # cambia con password sicura
      MYSQL_DATABASE: jplatform_db           # nome del tuo DB
      MYSQL_USER: jplatform_user             # utente applicazione
      MYSQL_PASSWORD: jplatform_pass         # cambia con password sicura
    volumes:
      - db_data:/var/lib/mysql               # dati persistenti
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # dump iniziale (opzionale)
    ports:
      - "3307:3306"                          # esponi solo se serve accesso esterno
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Applicazione Spring Boot ────────────────────────────────
  app:
    build: .
    container_name: jplatform-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/jplatform_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Rome
      SPRING_DATASOURCE_USERNAME: jplatform_user
      SPRING_DATASOURCE_PASSWORD: jplatform_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      UPLOAD_PATH: /app/uploads
    volumes:
      - uploads_data:/app/uploads            # file caricati (immagini, allegati)
    ports:
      - "8080:8080"                          # porta esterna:interna

volumes:
  db_data:
  uploads_data: