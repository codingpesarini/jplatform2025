<!doctype html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{manager/layout/template}">
<body>

<div layout:fragment="content">

  <form th:action="@{/admin/account/save}"
        method="post"
        id="account"
        class="form-bordered">

    <div class="msg_box msg_error" id="form_a_errors" style="display:none"></div>

    <header class="page-header mb-2">
      <div class="title-container mb-3">
        <h2 style="border-left: 5px solid #0088cc; padding-left: 15px;">
          Dettaglio Account
          <small th:if="${account.id != null}" th:text="'ID: ' + ${account.id}" style="font-size: 0.6em; vertical-align: middle; opacity: 0.8;"></small>
        </h2>
      </div>

      <div class="right-wrapper text-right" style="margin-left: auto; margin-right: 10%;">
        <a th:href="@{/admin/account/new}"
           class="mb-1 mt-1 mr-1 btn btn-sm btn-success">
          <i class="fas fa-plus-circle"></i> Nuovo
        </a>

        <a th:if="${account.id != null}"
           th:href="@{/admin/account/{id}/duplica(id=${account.id})}"
           onclick="return ConfermaOperazione(this.href, 'duplicare questo Account')"
           class="mb-1 mt-1 mr-1 btn btn-sm btn-info">
          <i class="fas fa-clone"></i> Duplica
        </a>

        <button type="button"
                onclick="InviaForm('account');"
                class="mb-1 mt-1 mr-1 btn btn-sm btn-primary">
          <i class="fas fa-save"></i> Salva
        </button>

        <a th:href="@{/admin/account}"
           onclick="CloseHsReloadBase();"
           class="mb-1 mt-1 mr-1 btn btn-sm btn-danger">
          <i class="fas fa-times-circle"></i> Esci
        </a>
      </div>
    </header>

    <input type="hidden" name="id" th:value="${account.id}"/>

    <div class="row" style="margin-top: -25px">
      <div class="col-lg-12">
        <div class="card shadow-sm border-0" style="border-radius: 15px; background: #fff; padding: 20px;">

          <div class="tabs tabs-secondary" id="mytabs">
            <ul class="nav nav-tabs border-0" role="tablist">
              <li class="nav-item storeTab" id="1" role="presentation">
                <a class="nav-link active" href="#tab_01" data-bs-toggle="tab">Generale</a>
              </li>
              <li class="nav-item storeTab" id="2">
                <a class="nav-link" href="#tab_02" data-bs-toggle="tab">Dati Account Email</a>
              </li>
              <li class="nav-item storeTab" id="3">
                <a class="nav-link" href="#tab_03" data-bs-toggle="tab">Dati Account PEC</a>
              </li>
            </ul>
          </div>
          <hr class="mt-0 mb-3">
          <div class="tab-content">

            <!-- TAB 01 — Generale -->
            <div id="tab_01" class="tab-pane active">
              <fieldset>
                <legend th:text="${account.id != null ? 'Definizione ID ' + account.id : 'Nuovo Account'}">Definizione</legend>
                <div class="row form-group">

                  <div class="col-lg-12 mb-3">
                    <label for="descrizione" class="lbl_a">Descrizione account</label>
                    <input type="text"
                           name="descrizione"
                           id="descrizione"
                           class="form-control obbligatorio"
                           th:value="${account.descrizione}"
                           required/>
                  </div>

                  <div class="col-lg-6 mb-3">
                    <label for="tipoAccount" class="lbl_a">Tipologia account</label>
                    <select name="tipoAccount" id="tipoAccount"
                            class="form-control obbligatorio" required>
                      <option value="">----- Seleziona -----</option>
                      <option value="EMAIL" th:selected="${account.tipoAccount == 'EMAIL'}">EMAIL</option>
                      <option value="PEC" th:selected="${account.tipoAccount == 'PEC'}">PEC</option>
                    </select>
                  </div>

                  <div class="col-lg-6 mb-3">
                    <label for="lasciaCopiaServer" class="lbl_a">Lascia una copia del messaggio sul server</label>
                    <select name="lasciaCopiaServer" id="lasciaCopiaServer"
                            class="form-control obbligatorio" required>
                      <option value="">----- Seleziona -----</option>
                      <option value="NO" th:selected="${account.lasciaCopiaServer == 'NO'}">NO</option>
                      <option value="SI" th:selected="${account.lasciaCopiaServer == 'SI'}">SI</option>
                    </select>
                  </div>

                </div>
              </fieldset>
            </div>

            <!-- TAB 02 — Dati Account Email -->
            <div id="tab_02" class="tab-pane">
              <fieldset>
                <legend>Account email</legend>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="emailAccount" class="lbl_a">Account email</label>
                    <input type="text" name="emailAccount" id="emailAccount"
                           class="form-control" th:value="${account.emailAccount}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="emailIntestazione" class="lbl_a">Intestazione email</label>
                    <input type="text" name="emailIntestazione" id="emailIntestazione"
                           class="form-control" th:value="${account.emailIntestazione}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="emailUser" class="lbl_a">Account email username</label>
                    <input type="text" name="emailUser" id="emailUser"
                           class="form-control" th:value="${account.emailUser}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="emailPassword" class="lbl_a">Account email password</label>
                    <input type="password" name="emailPassword" id="emailPassword"
                           class="form-control" th:value="${account.emailPassword}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="emailInServer" class="lbl_a">Server posta in entrata</label>
                    <input type="text" name="emailInServer" id="emailInServer"
                           class="form-control" th:value="${account.emailInServer}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="emailInServerPort" class="lbl_a">Porta server posta in entrata</label>
                    <input type="number" name="emailInServerPort" id="emailInServerPort"
                           class="form-control" min="1" th:value="${account.emailInServerPort}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="emailOutServer" class="lbl_a">Server posta in uscita</label>
                    <input type="text" name="emailOutServer" id="emailOutServer"
                           class="form-control" th:value="${account.emailOutServer}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="emailOutServerPort" class="lbl_a">Porta server posta in uscita</label>
                    <input type="number" name="emailOutServerPort" id="emailOutServerPort"
                           class="form-control" min="1" th:value="${account.emailOutServerPort}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="emailInServerType" class="lbl_a">Tipologia server posta in entrata</label>
                    <select name="emailInServerType" id="emailInServerType" class="form-control">
                      <option value="">----- Seleziona -----</option>
                      <option value="POP3" th:selected="${account.emailInServerType == 'POP3'}">POP3</option>
                      <option value="IMAP" th:selected="${account.emailInServerType == 'IMAP'}">IMAP</option>
                    </select>
                  </div>
                  <div class="col-lg-6">
                    <label for="emailOutServerAuth" class="lbl_a">Autorizzazione server posta in uscita</label>
                    <select name="emailOutServerAuth" id="emailOutServerAuth" class="form-control">
                      <option value="">----- Seleziona -----</option>
                      <option value="0" th:selected="${account.emailOutServerAuth == '0'}">Nessuna</option>
                      <option value="1" th:selected="${account.emailOutServerAuth == '1'}">Normale TLS/SSL</option>
                    </select>
                  </div>
                </div>

              </fieldset>
            </div>

            <!-- TAB 03 — Dati Account PEC -->
            <div id="tab_03" class="tab-pane">
              <fieldset>
                <legend>Account PEC</legend>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="pecAccount" class="lbl_a">Account PEC</label>
                    <input type="text" name="pecAccount" id="pecAccount"
                           class="form-control" th:value="${account.pecAccount}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="pecIntestazione" class="lbl_a">Intestazione PEC</label>
                    <input type="text" name="pecIntestazione" id="pecIntestazione"
                           class="form-control" th:value="${account.pecIntestazione}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="pecUser" class="lbl_a">Account PEC username</label>
                    <input type="text" name="pecUser" id="pecUser"
                           class="form-control" th:value="${account.pecUser}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="pecPassword" class="lbl_a">Account PEC password</label>
                    <input type="password" name="pecPassword" id="pecPassword"
                           class="form-control" th:value="${account.pecPassword}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="pecInServer" class="lbl_a">Server posta in entrata PEC</label>
                    <input type="text" name="pecInServer" id="pecInServer"
                           class="form-control" th:value="${account.pecInServer}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="pecInServerPort" class="lbl_a">Porta server posta in entrata PEC</label>
                    <input type="number" name="pecInServerPort" id="pecInServerPort"
                           class="form-control" min="1" th:value="${account.pecInServerPort}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="pecOutServer" class="lbl_a">Server posta in uscita PEC</label>
                    <input type="text" name="pecOutServer" id="pecOutServer"
                           class="form-control" th:value="${account.pecOutServer}"/>
                  </div>
                  <div class="col-lg-6">
                    <label for="pecOutServerPort" class="lbl_a">Porta server posta in uscita PEC</label>
                    <input type="number" name="pecOutServerPort" id="pecOutServerPort"
                           class="form-control" min="1" th:value="${account.pecOutServerPort}"/>
                  </div>
                </div>

                <div class="row form-group">
                  <div class="col-lg-6">
                    <label for="pecInServerType" class="lbl_a">Tipologia server posta in entrata PEC</label>
                    <select name="pecInServerType" id="pecInServerType" class="form-control">
                      <option value="">----- Seleziona -----</option>
                      <option value="POP3" th:selected="${account.pecInServerType == 'POP3'}">POP3</option>
                      <option value="IMAP" th:selected="${account.pecInServerType == 'IMAP'}">IMAP</option>
                    </select>
                  </div>
                  <div class="col-lg-6">
                    <label for="pecOutServerAuth" class="lbl_a">Autorizzazione server posta in uscita PEC</label>
                    <select name="pecOutServerAuth" id="pecOutServerAuth" class="form-control">
                      <option value="">----- Seleziona -----</option>
                      <option value="NO" th:selected="${account.pecOutServerAuth == 'NO'}">NO</option>
                      <option value="SI" th:selected="${account.pecOutServerAuth == 'SI'}">SI</option>
                    </select>
                  </div>
                </div>

              </fieldset>
            </div>

          </div><!-- fine tab-content -->
        </div><!-- fine tabs -->
      </div>
    </div>

  </form>

  <script>
    function InviaForm() {
      var form = $("#account");

      if (!form[0].checkValidity()) {
        form.addClass('was-validated');

        new PNotify({
          title: 'Attenzione!',
          text: 'Alcuni campi obbligatori del modulo richiedono un tuo intervento!',
          type: 'error'
        });

        return false;
      }

      form.addClass('was-validated');
      form[0].submit();
      return true;
    }
  </script>

</div>
</body>
</html>
