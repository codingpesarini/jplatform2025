<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{manager/layout/template}">
<head><title>Dettaglio Ruolo</title></head>
<body>
<div layout:fragment="content">

  <form id="ruolo" th:action="@{/admin/impostazioni/ruoli/save}" th:object="${ruolo}" method="post">
    <input type="hidden" th:field="${ruolo.id}"/>
    <div class="msg_box msg_error" id="form_a_errors" style="display:none"></div>

    <header class="page-header mb-2">
      <div class="title-container mb-3">
        <h2 style="border-left: 5px solid #0088cc; padding-left: 15px;">
          Dettaglio Ruolo
          <small th:if="${ruolo.id != null}" th:text="'ID: ' + ${ruolo.id}" style="font-size: 0.6em; vertical-align: middle; opacity: 0.8;"></small>
        </h2>
      </div>

      <div class="right-wrapper text-right" style="margin-left: auto; margin-right: 10%;">
        <a th:href="@{/admin/impostazioni/ruoli/new}" class="mb-1 mt-1 mr-1 btn btn-sm btn-success">
          <i class="fas fa-plus-circle"></i> Nuovo
        </a>

        <a th:if="${ruolo.id != null}"
           th:href="@{/admin/impostazioni/ruoli/{id}/duplica(id=${ruolo.id})}"
           class="mb-1 mt-1 mr-1 btn btn-sm btn-info">
          <i class="fas fa-clone"></i> Duplica
        </a>

        <button type="button" onclick="InviaForm('ruolo');"
                class="mb-1 mt-1 mr-1 btn btn-sm btn-primary">
          <i class="fas fa-save"></i> Salva
        </button>

        <a th:href="@{/admin/impostazioni/ruoli}" class="mb-1 mt-1 mr-1 btn btn-sm btn-danger">
          <i class="fas fa-times-circle"></i> Esci
        </a>
      </div>
    </header>

    <div class="row" style="margin-top: -25px">
      <div class="col-lg-12">
        <div class="card shadow-sm border-0" style="border-radius: 15px; background: #fff; padding: 20px;">

          <div class="tabs" id="mytabs">
            <ul class="nav nav-tabs border-0" role="tablist">
              <li class="nav-item storeTab" role="presentation">
              <li class="nav-item"><a class="nav-link active" href="#tab_01" data-bs-toggle="tab">Definizione</a></li>
              <li class="nav-item"><a class="nav-link" href="#tab_02" data-bs-toggle="tab">Permessi 1 (l1-l10)</a></li>
              <li class="nav-item"><a class="nav-link" href="#tab_03" data-bs-toggle="tab">Permessi 2 (s1-s10)</a></li>
            </ul>
          </div>
        <div class="tab-content">

          <!-- ══════════════════════════════════ TAB 01: DEFINIZIONE -->
          <div id="tab_01" class="tab-pane active">
            <fieldset>
              <legend>Dati principali</legend>
              <div class="row form-group">
                <div class="col-lg-12">
                  <label class="col-form-label">Nome</label>
                  <input type="text" th:field="${ruolo.nome}" class="form-control" required/>
                </div>
                <div class="col-lg-6">
                  <label class="col-form-label">Descrizione</label>
                  <input type="text" th:field="${ruolo.descrizione}" class="form-control"/>
                </div>
                <div class="col-lg-6">
                  <label class="col-form-label">Data di modifica</label>
                  <input type="text" th:field="${ruolo.datamodifica}" class="form-control dataBase"/>
                </div>
              </div>
            </fieldset>
          </div>

          <!-- ══════════════════════════════════ TAB 02: PERMESSI L1-L10 -->
          <div id="tab_02" class="tab-pane">
            <fieldset>
              <legend>Livelli permessi (l1-l10)</legend>
              <!-- Helper fragment per select livello — ripetuto per chiarezza -->
              <div th:each="i : ${#numbers.sequence(1,10)}">
                <div class="row form-group" th:if="${i % 2 == 1}">

                  <div class="col-lg-6">
                    <label class="col-form-label" th:text="${'l' + i}"></label>
                    <select th:field="*{__${'l' + i}__}" class="form-control">
                      <option value="">Indefinito</option>
                      <option value="0">Disattivo</option>
                      <option value="1">Attivo</option>
                    </select>
                  </div>

                  <div class="col-lg-6" th:if="${i + 1 <= 10}">
                    <label class="col-form-label" th:text="${'l' + (i + 1)}"></label>
                    <select th:field="*{__${'l' + (i + 1)}__}" class="form-control">
                      <option value="">Indefinito</option>
                      <option value="0">Disattivo</option>
                      <option value="1">Attivo</option>
                    </select>
                  </div>

                </div>
              </div>
            </fieldset>
          </div>


          <!-- ══════════════════════════════════ TAB 03: PERMESSI S1-S10 -->
          <div id="tab_03" class="tab-pane">
            <fieldset>
              <legend>Sezioni permessi (s1-s10)</legend>
              <div th:each="i : ${#numbers.sequence(1,10)}">
                <div class="row form-group" th:if="${i % 2 == 1}">

                  <div class="col-lg-6">
                    <label class="col-form-label" th:text="${'s' + i}"></label>
                    <select th:field="*{__${'s' + i}__}" class="form-control">
                      <option value="">Indefinito</option>
                      <option value="0">Disattivo</option>
                      <option value="1">Attivo</option>
                    </select>
                  </div>

                  <div class="col-lg-6" th:if="${i + 1 <= 10}">
                    <label class="col-form-label" th:text="${'s' + (i + 1)}"></label>
                    <select th:field="*{__${'s' + (i + 1)}__}" class="form-control">
                      <option value="">Indefinito</option>
                      <option value="0">Disattivo</option>
                      <option value="1">Attivo</option>
                    </select>
                  </div>

                </div>
              </div>
            </fieldset>
          </div>


        </div>
      </div>
    </div></div>
  </form>


  <script>
    function InviaForm() {
      var form = document.getElementById('ruolo');
      if (!form.checkValidity()) { form.classList.add('was-validated'); return; }
      form.submit();
    }
  </script>
</div>
</body>
</html>
