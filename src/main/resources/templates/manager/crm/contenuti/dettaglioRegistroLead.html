<!doctype html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{manager/layout/template}">
<body>

<div layout:fragment="content">

    <div id="form_a_errors" class="alert alert-danger" style="display:none"></div>

    <form th:action="@{/admin/crm/lead/save}"
          method="post"
          id="registrolead"
          class="form-bordered">

        <header class="page-header mb-4">
            <div class="d-flex align-items-center w-100">

                <div class="title-container">
                    <h2 style="border-left: 5px solid #0088cc; padding-left: 15px; margin: 0; white-space: nowrap;">
                        Dettaglio LEAD
                    </h2>
                </div>

                <div class="right-wrapper text-right" style="margin-left: auto; margin-right: 10%; margin-bottom: 20px;">
                    <button type="button"
                            onclick="inviaForm(event)"
                            class="mb-1 mt-1 mr-1 btn btn-sm btn-primary">
                        <i class="fas fa-save"></i> Salva
                    </button>

                    <a th:href="@{/admin/crm/dashboard}"
                       class="mb-1 mt-1 mr-1 btn btn-sm btn-danger">
                        <i class="fas fa-times-circle"></i> Esci
                    </a>
                </div>

            </div>
        </header>

        <div class="row" style="margin-top: -25px">
            <div class="col-lg-12">
                <div class="card shadow-sm border-0" style="border-radius: 15px; background: #fff; padding: 20px;">

                    <ul class="nav nav-tabs" role="tablist">
                            <li class="nav-item storeTab" role="presentation">
                            <a class="nav-link active" href="#tab_01" data-bs-toggle="tab">Definizione</a>
                        </li>
                        <li class="nav-item storeTab" role="presentation">
                            <!--a class="nav-link" href="#tab_02" data-bs-toggle="tab">Altri dati</a-->
                        </li>
                    </ul>
                    <div class="tab-content">

                        <!-- ═══ TAB 01 ═══ -->
                        <div id="tab_01" class="tab-pane active show">

                            <div class="row form-group">

                                <!-- SINISTRA: ANAGRAFICA -->
                                <div class="col-lg-9">
                                    <fieldset class="border p-3">
                                        <legend class="float-none w-auto px-2">Anagrafica</legend>

                                        <div class="row form-group">

                                            <div class="col-lg-12 text-right mb-2"
                                                 th:if="${registroLead.idutente != null and registroLead.idutente != 0}">
                                                <a th:if="${registroLead.utente != null and registroLead.utente.id != null and registroLead.utente.id > 0}"
                                                   class="mb-1 mt-1 mr-1 btn btn-primary">
                                                    <i class="fa fa-user"></i> Dettaglio anagrafica
                                                </a>
                                                <a href="javascript:void(0)" onclick="resetAnagraficaLeadCRM()"
                                                   class="mb-1 mt-1 mr-1 btn btn-primary">
                                                    <i class="fa fa-user-times"></i> Rimuovi anagrafica
                                                </a>
                                            </div>

                                            <div class="col-lg-12 mb-2">
                                                <label for="ricercaUtenteNuovoLead" class="form-label">Ricerca anagrafica rapida</label>
                                                <input type="text"
                                                       id="ricercaUtenteNuovoLead"
                                                       class="form-control js-autocomplete"
                                                       data-url="/admin/crm/utenti/search"
                                                       placeholder="Scrivi Cognome o Nome...">
                                            </div>

                                            <input type="hidden" id="idUtenteLead" name="idutente" th:value="${registroLead.idutente}">

                                            <input type="hidden" id="utenteid" name="utente.id" th:value="${registroLead.utente?.id}">

                                            <div class="col-lg-6">
                                                <label for="utentenome">Nome</label>
                                                <input type="text" class="form-control" id="utentenome" name="utente.nome" th:value="${registroLead.utente?.nome}">
                                            </div>
                                            <div class="col-lg-6">
                                                <label for="utentecognome">Cognome</label>
                                                <input type="text" class="form-control" id="utentecognome" name="utente.cognome" th:value="${registroLead.utente?.cognome}">
                                            </div>
                                            <div class="col-lg-4">
                                                <label for="utenteemail">Email</label>
                                                <input type="email" class="form-control" id="utenteemail" name="utente.email" th:value="${registroLead.utente?.email}">
                                            </div>
                                            <div class="col-lg-4">
                                                <label for="utentetelefono">Telefono</label>
                                                <input type="text" class="form-control" id="utentetelefono" name="utente.telefono" th:value="${registroLead.utente?.telefono}">
                                            </div>
                                        </div>
                                    </fieldset>
                                </div>

                                <!-- DESTRA: REGISTRO + COMUNICAZIONE -->
                                <div class="col-lg-3">

                                    <fieldset class="border p-3 mb-3">
                                        <legend class="float-none w-auto px-2">
                                            Registro LEAD #<span th:text="${registroLead.id != null and registroLead.id != -1 ? registroLead.id : 'nuovo'}">-</span>
                                        </legend>

                                        <!-- hidden -->
                                        <input type="hidden" name="id"               th:value="${registroLead.id}">
                                        <input type="hidden" name="idutente"         th:value="${registroLead.idutente}" id="idutente">
                                        <input type="hidden" name="idleadstore"      th:value="${registroLead.idleadstore}">
                                        <input type="hidden" name="idamministratore" th:value="${registroLead.idamministratore}">
                                        <input type="hidden" name="store"            th:value="${registroLead.store}">
                                        <input type="hidden" name="direzione"        th:value="${registroLead.direzione}">

                                        <div class="row form-group">

                                            <div class="col-lg-6">
                                                <label for="data" class="form-label">Data</label>
                                                <input type="text"
                                                       class="form-control dataBase obbligatorio notAutocomplete"
                                                       id="data"
                                                       name="data"
                                                       th:value="${registroLead.data}">
                                            </div>

                                            <div class="col-lg-6">
                                                <label for="stato" class="form-label">Stato</label>
                                                <select class="form-control obbligatorio" name="stato" id="stato">
                                                    <option value="0" th:selected="${registroLead.stato == '0'}">Non gestito</option>
                                                    <option value="1" th:selected="${registroLead.stato == '1'}">Da richiamare</option>
                                                    <option value="2" th:selected="${registroLead.stato == '2'}">Inviare email</option>
                                                    <option value="3" th:selected="${registroLead.stato == '3'}">In lavorazione</option>
                                                    <option value="4" th:selected="${registroLead.stato == '4'}">Completato</option>
                                                    <option value="5" th:selected="${registroLead.stato == '5'}">Annullato</option>
                                                </select>
                                            </div>

                                            <div class="col-lg-12 mt-2">
                                                <label class="col-form-label">Area interesse</label>
                                                <select class="form-control multiselect obbligatorio"
                                                        name="metatag"
                                                        multiple="multiple">
                                                    <option th:each="area : ${areeInteresse}"
                                                            th:value="${area.id}"
                                                            th:text="${area.descrizione}"
                                                            th:selected="${registroLead.metatag != null and #lists.contains(registroLead.metatag, area.id)}">
                                                    </option>
                                                </select>
                                            </div>

                                        </div>
                                    </fieldset>

                                    <fieldset class="border p-3">
                                        <legend class="float-none w-auto px-2">Comunicazione</legend>
                                        <div class="row form-group">
                                            <div class="col-lg-12">
                                                <a th:href="@{/admin/crm/lead/new/uscita/Email}"
                                                   class="mb-1 mt-1 btn btn-primary btn-block">
                                                    <i class="fa fa-envelope"></i> Invia email
                                                </a>
                                                <a th:href="@{/admin/crm/lead/new/uscita/Sms}"
                                                   class="mb-1 mt-1 btn btn-primary btn-block">
                                                    <i class="fa fa-comments"></i> Invia SMS
                                                </a>
                                            </div>
                                        </div>
                                    </fieldset>

                                </div>
                            </div>

                            <!-- NOTE OPERATIVE -->
                            <fieldset>
                                <legend>Note operative per gestione Lead</legend>
                                <div class="row form-group">
                                    <div class="col-lg-12">
                                        <label class="col-form-label" for="notalead">
                                            Note -
                                            <a href="javascript:void(0)"
                                               onclick="toggleEditor('notalead');">Editor</a>
                                        </label>
                                        <textarea name="notalead" id="notalead"
                                                  class="tinymce5basic form-control"
                                                  th:text="${registroLead.notalead}"></textarea>
                                    </div>
                                </div>
                            </fieldset>

                            <!-- MESSAGGIO ORIGINALE: solo per lead esistenti -->
                            <fieldset class="border p-3 mt-2"
                                      th:if="${registroLead.id != null and registroLead.id != -1}">
                                <legend class="float-none w-auto px-2">Messaggio originale</legend>

                                <!-- store: commenti -->
                                <div th:if="${registroLead.store == 'commenti'}">
                                    <div class="row form-group">
                                        <div class="col-lg-4">
                                            <label class="col-form-label">Data ricezione</label>
                                            <input type="text" class="form-control" readonly
                                                   th:value="${registroLead.commento?.data}">
                                        </div>
                                    </div>
                                    <div class="row form-group">
                                        <div class="col-lg-12">
                                            <textarea class="form-control markdown" readonly
                                                      th:text="${registroLead.commento?.messaggio}"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <!-- store: emailstore -->
                                <div th:if="${registroLead.store == 'emailstore'}">
                                    <div class="row form-group">
                                        <div class="col-lg-4">
                                            <label class="col-form-label">Data ricezione</label>
                                            <input type="text" class="form-control" readonly
                                                   th:value="${registroLead.messaggioEmail?.dataSimple}">
                                        </div>
                                    </div>
                                    <div class="row form-group">
                                        <div class="col-lg-12">
                                            <textarea class="form-control tinymce5viewonly" readonly
                                                      th:text="${registroLead.messaggioEmail?.testo}"></textarea>
                                        </div>
                                    </div>
                                    <div class="row form-group"
                                         th:if="${registroLead.messaggioEmail?.allegati != null and !#lists.isEmpty(registroLead.messaggioEmail.allegati)}">
                                        <div class="col-lg-12">
                                            <ul class="mb-0">
                                                <li th:each="allegato : ${registroLead.messaggioEmail.allegati}">
                                                    <a th:href="@{/admin/email/allegato(id=${registroLead.idleadstore},filename=${allegato.id})}"
                                                       target="_blank">
                                                        <img th:src="@{'/manager/assets/images/filetypes/32/' + ${allegato.type} + '.png'}"
                                                             width="25" height="25"
                                                             style="vertical-align:middle" alt="">
                                                        <span th:text="${allegato.nome}"></span>
                                                    </a>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>

                            </fieldset>

                            <!-- LOG ATTIVITÀ -->
                            <fieldset class="border p-3 mt-2"
                                      th:if="${registroLead.id != null and registroLead.id != -1 and registroLead.log != null and !#strings.isEmpty(registroLead.log)}">
                                <legend class="float-none w-auto px-2">Log attività</legend>
                                <div th:utext="${registroLead.log}"></div>
                            </fieldset>

                        </div>
                        <!-- /TAB 01 -->

                        <!-- ═══ TAB 02 ═══ -->
                        <div id="tab_02" class="tab-pane">
                            <fieldset class="border p-3">
                                <legend class="float-none w-auto px-2">Altri dati</legend>
                                <div class="row form-group">

                                    <th:block th:each="i : ${#numbers.sequence(1, 10)}">
                                        <div class="col-lg-4 mb-3">
                                            <label th:for="${'l' + i}" class="col-form-label"
                                                   th:text="${'l' + i}">lN</label>
                                            <select th:name="${'l' + i}" th:id="${'l' + i}" class="form-control">
                                                <option value=""
                                                        th:selected="${registroLead['l' + i] == null or registroLead['l' + i] == ''}">
                                                    Indefinito
                                                </option>
                                                <option value="0"
                                                        th:selected="${registroLead['l' + i] == '0'}">
                                                    Disattivo
                                                </option>
                                                <option value="1"
                                                        th:selected="${registroLead['l' + i] == '1'}">
                                                    Attivo
                                                </option>
                                            </select>
                                        </div>
                                    </th:block>

                                </div>
                            </fieldset>
                        </div>
                        <!-- /TAB 02 -->

                    </div>
                </div>
            </div>
        </div>

    </form>

    <script>
        function inviaForm(e) {
            if (e) e.preventDefault();
            var form = document.getElementById('registrolead');
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                new PNotify({
                    title: 'Attenzione!',
                    text: 'Alcuni campi obbligatori del modulo richiedono un tuo intervento!',
                    type: 'error'
                });
                return false;
            }
            form.classList.add('was-validated');
            document.getElementById('LoadingOverlayApi').dispatchEvent(new Event('loading-overlay:show'));
            form.submit();
            return true;
        }

        function resetAnagraficaLeadCRM() {
            document.getElementById('idutente').value = '0';
            ['utentenome', 'utentecognome', 'utenteemail',
             'utentetelefono', 'utentetelefono2', 'utenteid'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.value = '';
            });
        }

    </script>

</div>
</body>
</html>
