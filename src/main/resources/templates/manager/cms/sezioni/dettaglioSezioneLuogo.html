<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">

  <form th:action="@{/admin/sezioni/save(storeId=${sezione.id})}"
        method="post"
        enctype="multipart/form-data"
        id="sezione"
        class="form-bordered">

    <header class="page-header mb-2">
      <h2 th:text="${sezione.titolo}">Titolo</h2>
      <div class="right-wrapper text-right">
        <div class="switch switch-sm switch-primary" title="Salvataggio automatico">
          <input type="checkbox" name="switch" title="Salvataggio automatico"
                 data-plugin-ios-switch="" id="autosave" style="display:none;">
        </div>
        <a th:href="@{/admin/sezioni/new}" class="mb-1 mt-1 mr-1 btn btn-sm btn-default">
          <i class="fas fa-file-medical"></i> Nuova
        </a>
        <a th:href="@{/admin/sezioni/{id}/duplicate(id=${sezione.id})}"
           onclick="return ConfermaOperazione(this.href,'duplicare questa sezione')"
           class="mb-1 mt-1 mr-1 btn btn-sm btn-default">
          <i class="fas fa-clone"></i> Duplica
        </a>
        <button type="button" class="mb-1 mt-1 mr-1 btn btn-sm btn-primary"
                onclick="InviaForm('sezione');">
          <i class="ti ti-device-floppy me-1"></i> Salva
        </button>
        <a th:href="@{/admin/sezioni}" onclick="CloseHsReloadBase();"
           class="mb-1 mt-1 mr-1 btn btn-sm btn-default">
          <i class="fas fa-times-circle"></i> Esci
        </a>
      </div>
    </header>

    <div class="row">
      <div class="col-lg-12">
        <div class="tabs" id="mytabs">

          <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link active" href="#tab_01" data-bs-toggle="tab" role="tab">Definizione</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_02" data-bs-toggle="tab" role="tab">Informazioni essenziali</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_03" data-bs-toggle="tab" role="tab">Contenuto WEB</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_04" data-bs-toggle="tab" role="tab">Immagini</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_05" data-bs-toggle="tab" role="tab">Allegati</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_06" data-bs-toggle="tab" role="tab">Autorizzazioni</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_07" data-bs-toggle="tab" role="tab">Altro</a>
            </li>
            <li class="nav-item storeTab" role="presentation">
              <a class="nav-link" href="#tab_08" data-bs-toggle="tab" role="tab">Relazioni</a>
            </li>
          </ul>

          <div class="tab-content">

            <!-- TAB 01 — uguale al default, incluso via replace -->
            <div id="tab_01" class="tab-pane active" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab01}"></th:block>
            </div>

            <!-- TAB 02 — SPECIFICO LUOGO -->
            <div id="tab_02" class="tab-pane" role="tabpanel">
              <div class="row form-group">

                <div class="col-lg-6">
                  <label for="varchar1" class="col-form-label">Tipologia organizzazione</label>
                  <select name="varchar1" id="varchar1" class="form-control obbligatorio">
                    <option value="">----- Seleziona Tipologia organizzazione -----</option>
                    <option value="Politica"        th:selected="${sezione.varchar1 == 'Politica'}">Politica</option>
                    <option value="Amministrativa"  th:selected="${sezione.varchar1 == 'Amministrativa'}">Amministrativa</option>
                    <option value="Altra tipologia" th:selected="${sezione.varchar1 == 'Altra tipologia'}">Altra tipologia</option>
                  </select>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="riassunto">
                    <strong>Abstract</strong> - Sintetica descrizione
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'riassunto');">Editor</a>
                  </label>
                  <textarea name="riassunto" id="riassunto"
                            class="tinymce5minimal form-control"
                            th:text="${sezione.riassunto}"></textarea>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="text1">
                    <strong>Descrizione</strong> - Descrizione del luogo
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'text1');">Editor</a>
                  </label>
                  <textarea name="text1" id="text1"
                            class="tinymce5minimal form-control"
                            th:text="${sezione.text1}"></textarea>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="text2">
                    <strong>Modalità di accesso</strong> - Servizi disponibili e accessi per disabili
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'text2');">Editor</a>
                  </label>
                  <textarea name="text2" id="text2"
                            class="tinymce5minimal form-control"
                            th:text="${sezione.text2}"></textarea>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="text3">
                    <strong>Dove</strong> - Indirizzo del luogo
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'text3');">Editor</a>
                  </label>
                  <textarea name="text3" id="text3"
                            class="tinymce5minimal form-control"
                            th:text="${sezione.text3}"></textarea>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="text4">
                    <strong>Contatti</strong> - Telefono, email, PEC
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'text4');">Editor</a>
                  </label>
                  <textarea name="text4" id="text4"
                            class="tinymce5minimal form-control"
                            th:text="${sezione.text4}"></textarea>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="text5">
                    <strong>Posizione GPS</strong> - Georeferenziazione e link a mappa
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'text5');">Editor</a>
                  </label>
                  <textarea name="text5" id="text5"
                            class="form-control"
                            th:text="${sezione.text5}"></textarea>
                </div>

                <div class="col-lg-6">
                  <label class="col-form-label" for="text6">
                    <strong>Ulteriori informazioni</strong>
                    <a href="javascript:void(0)" onclick="tinymce.execCommand('mceToggleEditor',false,'text6');">Editor</a>
                  </label>
                  <textarea name="text6" id="text6"
                            class="form-control"
                            th:text="${sezione.text6}"></textarea>
                </div>

              </div>
            </div>
            <!-- fine TAB 02 LUOGO -->

            <!-- TAB 03-08: uguali al default -->
            <div id="tab_03" class="tab-pane" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab_03}"></th:block>
            </div>
            <div id="tab_04" class="tab-pane" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab_04}"></th:block>
            </div>
            <div id="tab_05" class="tab-pane" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab_05}"></th:block>
            </div>
            <div id="tab_06" class="tab-pane" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab_06}"></th:block>
            </div>
            <div id="tab_07" class="tab-pane" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab_07}"></th:block>
            </div>
            <div id="tab_08" class="tab-pane" role="tabpanel">
              <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: tab_08}"></th:block>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- CAMPI HIDDEN — uguali al default -->
    <th:block th:replace="~{manager/fragments/section_frag/dettaglioSezione :: hiddenFields}"></th:block>

  </form>

  <script th:inline="javascript">
    $(document).ready(function() {
      AttivaDataPubblicazione();
      AttivaLinkEsterno();
      AttivaAutorizzazioniUtente();
      AttivaExtraTag();
      $('#EreditaExtraTag').on('click', function() { ApplicaExtraTagContenuti(); return false; });
    });

    function RimuoviUtenteAssociato(id) {
      var stringa = $('#utentiAssociatiString').val();
      stringa = stringa.replace('(' + id + ');', '');
      $('#utentiAssociatiString').val(stringa);
      $('#' + id).remove();
    }
  </script>

</th:block>
</body>
</html>
