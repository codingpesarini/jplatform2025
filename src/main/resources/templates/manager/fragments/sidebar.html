<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="sidebar" class="pc-sidebar">
    <div class="navbar-wrapper">
        <!-- Logo -->
        <div class="m-header">
            <a th:href="@{/admin}" class="b-brand text-primary">
                <img th:src="@{manager/assets/images/logo-dark.svg}"
                     class="img-fluid logo-lg"
                     alt="logo" />
                <span class="badge bg-light-success rounded-pill ms-2 theme-version">v1.0</span>
            </a>
        </div>

        <div class="navbar-content">
            <!-- User Card -->
            <div class="card pc-user-card">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0">
                            <img th:src="@{/manager/assets/images/user/avatar-1.jpg}"
                                 alt="user-image"
                                 class="user-avtar wid-45 rounded-circle" />
                        </div>
                        <div class="flex-grow-1 ms-3 me-2">
                            <h6 class="mb-0" th:text="${config.amministratore?.nomeCompleto ?: 'Admin'}">Admin</h6>
                            <small>Amministratore</small>
                        </div>
                        <a class="btn btn-icon btn-link-secondary avtar"
                           data-bs-toggle="collapse"
                           href="#pc_sidebar_userlink">
                            <svg class="pc-icon">
                                <use xlink:href="#custom-sort-outline"></use>
                            </svg>
                        </a>
                    </div>
                    <div class="collapse pc-user-links" id="pc_sidebar_userlink">
                        <div class="pt-3">
                            <a href="#!">
                                <i class="ti ti-user"></i>
                                <span>Il mio Account</span>
                            </a>
                            <a href="#!">
                                <i class="ti ti-settings"></i>
                                <span>Impostazioni</span>
                            </a>
                            <a th:href="@{/logout}">
                                <i class="ti ti-power"></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Menu -->
            <ul class="pc-navbar">
                <li class="pc-item pc-caption">
                    <label>Navigation</label>
                </li>
                <li class="pc-item">
                    <a th:href="@{/admin}" class="pc-link">
                        <span class="pc-micon">
                            <svg class="pc-icon">
                                <use xlink:href="#custom-status-up"></use>
                            </svg>
                        </span>
                        <span class="pc-mtext">Dashboard</span>
                    </a>
                </li>
                <li class="pc-item pc-caption">
                    <label>Admin Panel</label>
                    <svg class="pc-icon">
                        <use xlink:href="#custom-layer"></use>
                    </svg>
                </li>
                <li class="pc-item pc-hasmenu">
                    <a href="#!" class="pc-link">
                        <span class="pc-micon">
                            <svg class="pc-icon">
                                <use xlink:href="#custom-document"></use>
                            </svg>
                        </span>
                        <span class="pc-mtext">Contenuti</span>
                        <span class="pc-arrow"><i data-feather="chevron-right"></i></span>
                    </a>
                    <ul class="pc-submenu">
                        <li class="pc-item"><a class="pc-link" href="#">News</a></li>
                        <li class="pc-item"><a class="pc-link" href="#">Pagine</a></li>
                        <li class="pc-item"><a class="pc-link" href="#">Documenti</a></li>
                    </ul>
                </li>
                <li class="pc-item">
                    <a href="#!" class="pc-link">
                        <span class="pc-micon">
                            <svg class="pc-icon">
                                <use xlink:href="#custom-user"></use>
                            </svg>
                        </span>
                        <span class="pc-mtext">Utenti</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
