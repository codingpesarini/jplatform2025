<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header" class="pc-header">
    <div class="header-wrapper">

        <!-- Mobile Menu -->
        <div class="me-auto pc-mob-drp">
            <ul class="list-unstyled">

                <!-- Desktop: collapse sidebar -->
                <li class="pc-h-item pc-sidebar-collapse">
                    <button type="button"
                            class="pc-head-link ms-0"
                            id="sidebar-hide"
                            aria-label="Apri/chiudi sidebar">
                        <i class="ti ti-menu-2"></i>
                    </button>
                </li>

                <!-- Mobile: open sidebar popup -->
                <li class="pc-h-item pc-sidebar-popup">
                    <button type="button"
                            class="pc-head-link ms-0"
                            id="mobile-collapse"
                            aria-label="Apri/chiudi menu mobile">
                        <i class="ti ti-menu-2"></i>
                    </button>
                </li>

            </ul>
        </div>

        <!-- Header Actions -->
        <div class="ms-auto">
            <ul class="list-unstyled">

                <!-- Theme Toggle -->
                <li class="dropdown pc-h-item">
                    <a class="pc-head-link dropdown-toggle arrow-none me-0"
                       data-bs-toggle="dropdown"
                       href="javascript:void(0)"
                       role="button"
                       aria-label="Cambia tema">
                        <svg class="pc-icon">
                            <use xlink:href="#custom-sun-1"></use>
                        </svg>
                    </a>

                    <div class="dropdown-menu dropdown-menu-end pc-h-dropdown">
                        <a href="javascript:void(0)" class="dropdown-item" onclick="layout_change('dark')">
                            <svg class="pc-icon">
                                <use xlink:href="#custom-moon"></use>
                            </svg>
                            <span>Dark</span>
                        </a>
                        <a href="javascript:void(0)" class="dropdown-item" onclick="layout_change('light')">
                            <svg class="pc-icon">
                                <use xlink:href="#custom-sun-1"></use>
                            </svg>
                            <span>Light</span>
                        </a>
                    </div>
                </li>

                <!-- Notifiche Email -->
                <li class="dropdown pc-h-item" id="emailNotifyItem" style="display:none">
                    <a class="pc-head-link dropdown-toggle arrow-none me-0 position-relative"
                       data-bs-toggle="dropdown" href="javascript:void(0)" role="button">
                        <i class="ti ti-mail" style="font-size:20px"></i>
                        <span id="emailBadge"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              style="display:none;font-size:10px"></span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end pc-h-dropdown" style="min-width:260px">
                        <div class="dropdown-header fw-bold px-3 py-2 border-bottom">
                            <i class="ti ti-mail me-1"></i> Caselle di posta
                        </div>
                        <div id="emailDropdownBody">
                            <div class="text-center p-3 text-muted" style="font-size:12px">
                                <div class="spinner-border spinner-border-sm"></div> Caricamento...
                            </div>
                        </div>
                    </div>
                </li>

                <!-- User Profile -->
                <li class="dropdown pc-h-item header-user-profile">
                    <a class="pc-head-link dropdown-toggle arrow-none me-0"
                       data-bs-toggle="dropdown"
                       href="javascript:void(0)"
                       role="button"
                       aria-label="Apri profilo">
                        <img th:src="@{/manager/assets/img/user/avatar-2.jpg}"
                             alt="user-image"
                             class="user-avtar" />
                    </a>

                    <div class="dropdown-menu dropdown-user-profile dropdown-menu-end pc-h-dropdown">
                        <div class="dropdown-header d-flex align-items-center justify-content-between">
                            <h5 class="m-0">Profilo</h5>
                        </div>
                        <div class="dropdown-body">
                            <div class="profile-notification-scroll position-relative"
                                 style="max-height: calc(100vh - 225px)">
                                <div class="d-flex mb-1">
                                    <div class="flex-shrink-0">
                                        <img th:src="@{/manager/assets/img/user/avatar-2.jpg}"
                                             alt="user-image"
                                             class="user-avtar wid-35" />
                                    </div>
                                    <div class="flex-grow-1 ms-3">
                                        <h6 class="mb-1" th:text="${config?.amministratore?.nomeCompleto}">Admin</h6>
                                        <span th:text="${config?.amministratore?.email}">admin@email.com</span>
                                    </div>
                                </div>

                                <hr class="border-secondary border-opacity-50" />

                                <div class="d-grid mb-3">
                                    <a th:href="@{/logout}" class="btn btn-primary">
                                        <svg class="pc-icon me-2">
                                            <use xlink:href="#custom-logout-1-outline"></use>
                                        </svg>
                                        Logout
                                    </a>
                                </div>

                            </div>
                        </div>
                    </div>
                </li>

            </ul>
        </div>
        <script>
            (function() {
                function caricaNotificheEmail() {
                    fetch('/admin/email/api/nonletti')
                        .then(function(r) { return r.json(); })
                        .then(function(lista) {
                            if (!lista || lista.length === 0) return;

                            var totaleNonLetti = lista.reduce(function(s, a) { return s + (a.nonLetti || 0); }, 0);
                            var badge  = document.getElementById('emailBadge');
                            var item   = document.getElementById('emailNotifyItem');
                            var body   = document.getElementById('emailDropdownBody');

                            // Mostra l'icona solo se ci sono account associati
                            if (item) item.style.display = '';

                            // Badge totale
                            if (badge) {
                                if (totaleNonLetti > 0) {
                                    badge.textContent = totaleNonLetti > 99 ? '99+' : totaleNonLetti;
                                    badge.style.display = '';
                                } else {
                                    badge.style.display = 'none';
                                }
                            }

                            // Dropdown con un link per account
                            if (body) {
                                var html = '';
                                lista.forEach(function(acc) {
                                    var label = acc.nonLetti > 0
                                        ? '<span class="badge bg-danger ms-auto">' + acc.nonLetti + '</span>'
                                        : '<span class="badge bg-secondary ms-auto">0</span>';
                                    html += '<a href="/admin/email/inbox/' + acc.id + '" class="dropdown-item d-flex align-items-center gap-2 py-2">' +
                                        '<i class="ti ti-' + (acc.tipo === 'PEC' ? 'shield-check' : 'mail') + ' text-muted"></i>' +
                                        '<span class="flex-grow-1" style="font-size:13px">' + acc.descrizione + '</span>' +
                                        label +
                                        '</a>';
                                });
                                body.innerHTML = html;
                            }
                        })
                        .catch(function() {
                            // Silenzioso — non blocca l'UI se il server mail non risponde
                        });
                }

                // Carica subito al DOMContentLoaded
                document.addEventListener('DOMContentLoaded', function() {
                    caricaNotificheEmail();
                    // Ricarica ogni 2 minuti
                    setInterval(caricaNotificheEmail, 2 * 60 * 1000);
                });
            })();
        </script>
    </div>
</header>

</body>
</html>
