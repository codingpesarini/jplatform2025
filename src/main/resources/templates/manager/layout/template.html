<!doctype html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      data-pc-preset="preset-1"
      data-pc-sidebar-caption="true"
      data-pc-layout="vertical"
      data-pc-direction="ltr"
      data-pc-theme="light">

    <!-- HEAD -->
    <th:block th:replace="~{manager/fragments/head :: head}"></th:block>
    <th:block layout:fragment="extra-css"></th:block>


<body>
<!-- Preloader -->
<div class="loader-bg">
    <div class="loader-track">
        <div class="loader-fill"></div>
    </div>
</div>

<!-- Sidebar -->
<th:block th:replace="~{manager/fragments/sidebar :: sidebar}"></th:block>

<!-- Header -->
<th:block th:replace="~{manager/fragments/header :: header}"></th:block>

<!-- Main Content -->
<div class="pc-container">
    <div class="pc-content">
        <div th:fragment="content">
            <div layout:fragment="content">
                <p>Contenuto pagina</p>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<th:block th:replace="~{manager/fragments/footer :: footer}"></th:block>

<!-- Customizer -->
<th:block th:replace="~{manager/fragments/customizer :: customizer}"></th:block>

<!-- Scripts -->
<th:block th:replace="~{manager/fragments/scripts :: scripts}"></th:block>
<th:block layout:fragment="extra-js"></th:block>

<!-- Toast Container -->
<div id="toast-container"
     class="toast-container position-fixed bottom-0 end-0 p-3"
     style="z-index: 9999;">
</div>
<!-- Confirm Modal -->
<div id="confirmModal" class="modal fade" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="confirmModalLabel">Conferma</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="confirmModalMessage">Sei sicuro di voler procedere?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="button" class="btn btn-danger" id="confirmModalBtn">Conferma</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal FileManager — disponibile globalmente -->
<div id="modalAccount" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered" id="modalAccountDialog"
         style="max-width:1200px;">
        <div class="modal-content">
            <div class="modal-header" id="modalAccountHeader" style="cursor:move;">
                <h5 class="modal-title" id="modalAccountTitle">Caricamento...</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalAccountBody" style="max-height:1200px; overflow-y:auto;">
                <div class="text-center p-4">
                    <div class="spinner-border text-info"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
