<!doctype html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{manager/layout/template}">
<body>

<div layout:fragment="content">

    <div class="page-header">
        <div class="page-block">
            <div class="row align-items-center">
                <div class="col-md-12">
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/admin}">Home</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/admin/email}">Mailbox</a></li>
                        <li class="breadcrumb-item active">Dettaglio Email</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/admin/email/inbox/{acc}(acc=${config.amministratore.idaccountemail})}"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="ti ti-arrow-left"></i>
                </a>
                <div>
                    <h5 class="mb-0" th:text="${messaggioEmail.oggetto}">Oggetto</h5>
                    <small class="text-muted" th:text="${messaggioEmail.nomeAccount}">account</small>
                </div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/admin/email/rispondi/{id}/{acc}(id=${messaggioEmail.id},acc=${config.amministratore.idaccountemail})}"
                   class="btn btn-sm btn-primary">
                    <i class="ti ti-arrow-back-up me-1"></i> Rispondi
                </a>
                <a th:href="@{/admin/email/inoltra/{id}/{acc}(id=${messaggioEmail.id},acc=${config.amministratore.idaccountemail})}"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="ti ti-send me-1"></i> Inoltra
                </a>
            </div>
        </div>

        <div class="card-body">

            <!-- HEADER MITTENTE -->
            <div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom">
                <div class="d-flex align-items-center gap-3">
                    <div class="avtar avtar-m bg-light-primary rounded-circle">
                        <i class="ti ti-user f-20"></i>
                    </div>
                    <div>
                        <h6 class="mb-0" th:text="${messaggioEmail.mittente}">Mittente</h6>
                        <small class="text-muted">
                            From: <span th:text="${messaggioEmail.indirizzoMittente}">email@example.com</span>
                        </small>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <small class="text-muted" th:text="${messaggioEmail.date}">01/01/2025</small>
                    <div class="dropdown">
                        <a href="#" class="avtar avtar-s btn-link-secondary" data-bs-toggle="dropdown">
                            <i class="ti ti-dots-vertical f-18"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/admin/email/rispondi/{id}/{acc}(id=${messaggioEmail.id},acc=${config.amministratore.idaccountemail})}">
                                    <i class="ti ti-arrow-back-up me-2"></i>Rispondi
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/admin/email/inoltra/{id}/{acc}(id=${messaggioEmail.id},acc=${config.amministratore.idaccountemail})}">
                                    <i class="ti ti-send me-2"></i>Inoltra
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li th:if="${!messaggioEmail.mittenteNoto}">
                                <a class="dropdown-item text-primary"
                                   th:href="@{/admin/crm/lead/open(id=-1,idutente=0,idleadstore=${messaggioEmail.id},store='emailstore')}">
                                    <i class="ti ti-user-plus me-2"></i>Profila come LEAD
                                </a>
                            </li>
                            <li th:if="${messaggioEmail.mittenteNoto}">
                                <a class="dropdown-item text-primary"
                                   th:href="@{/admin/crm/lead/open(id=-1,idutente=${messaggioEmail.idMittenteNoto},idleadstore=${messaggioEmail.id},store='emailstore')}">
                                    <i class="ti ti-user-check me-2"></i>Profila LEAD per utente
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- CORPO EMAIL -->
            <div class="mb-4" style="min-height:300px">
                <iframe width="100%" id="myframe" frameborder="0" style="min-height:400px;width:100%"></iframe>
                <textarea id="textmail" name="content" rows="1"
                          style="visibility:hidden;height:0"
                          th:text="${messaggioEmail.messaggio}"></textarea>
            </div>

            <!-- ALLEGATI -->
            <div th:if="${!#lists.isEmpty(messaggioEmail.allegati)}" class="mt-4 pt-3 border-top">
                <p class="mb-3">
                    <i class="ti ti-paperclip me-1"></i>
                    <strong th:text="${#lists.size(messaggioEmail.allegati) + ' Allegati'}">Allegati</strong>
                </p>
                <div class="row g-2">
                    <div th:each="allegato : ${messaggioEmail.allegati}" class="col-auto">
                        <a th:href="@{/admin/email/allegato/{id}/{filename}/{acc}(id=${messaggioEmail.id},filename=${allegato.id},acc=${config.amministratore.idaccountemail})}"
                           target="_blank"
                           class="card border text-decoration-none p-2 d-flex flex-row align-items-center gap-2"
                           style="min-width:150px">
                            <i class="ti ti-file f-20 text-primary"></i>
                            <div>
                                <p class="mb-0 small fw-medium" th:text="${allegato.nome}">file.pdf</p>
                            </div>
                            <i class="ti ti-download ms-auto text-muted"></i>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            var textArea = window.parent ?
                window.parent.document.getElementById('textmail') :
                document.getElementById('textmail');

            if (!textArea) textArea = document.getElementById('textmail');

            var iFrame = document.getElementById('myframe');
            if (iFrame && textArea) {
                var doc = iFrame.contentWindow.document;
                doc.open();
                doc.write(textArea.value);
                doc.close();
                setTimeout(function() {
                    iFrame.style.height = (doc.documentElement.scrollHeight + 30) + 'px';
                }, 300);
            }
        });
    </script>

</div>
</body>
</html>
