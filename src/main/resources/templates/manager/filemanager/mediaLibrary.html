<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{manager/layout/template}">
<head>
  <title>CMS - Media Library</title>
  <style>
    .fm-sidebar { width:220px; min-height:400px; border-right:1px solid var(--bs-border-color); padding:8px 0; flex-shrink:0; }
    .fm-main { flex:1; min-width:0; }
    .fm-wrapper { display:flex; }
    .tree-item { padding:5px 12px; font-size:13px; border-left:3px solid transparent; }
    .tree-item:hover { background:var(--bs-light); border-left-color:var(--bs-primary); }
    .tree-item a { color:var(--bs-body-color); text-decoration:none; display:block; }
    .tree-item.active { background:var(--bs-primary-bg-subtle); border-left-color:var(--bs-primary); font-weight:600; }
    .tree-children { padding-left:14px; margin-left:14px; border-left:1px dashed var(--bs-border-color); }
    .file-card-fm { cursor:pointer; transition:box-shadow .2s; }
    .file-card-fm:hover { box-shadow:0 4px 15px rgba(0,0,0,.1); }
    .file-card-fm.selected { border-color:var(--bs-primary) !important; opacity:.8; }
    .file-thumb { height:100px; display:flex; align-items:center; justify-content:center; overflow:hidden; border-radius:6px; background:var(--bs-light); }
    .file-thumb img { max-width:100%; max-height:100px; object-fit:cover; }
    .filter-active { border:2px solid var(--bs-primary) !important; }
  </style>
</head>
<body>
<div layout:fragment="content">

  <script th:inline="javascript">
    var currentFolder = /*[[${currentFolder}]]*/ '1';
    var sorgente      = /*[[${sorgente}]]*/ '';
  </script>

  <div class="page-header">
    <div class="page-block">
      <div class="row align-items-center">
        <div class="col-md-12">
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Home</a></li>
            <li class="breadcrumb-item active">Media Library</li>
          </ul>
        </div>
        <div class="col-md-12">
          <div class="page-header-title">
            <h2 style="border-left: 5px solid #0088cc; padding-left: 15px; display: inline-block;" class="mb-0">
              Media Library
            </h2>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12">

      <a class="h5 text-hover-primary my-3 d-block" data-bs-toggle="collapse"
         href="#collapseFileFilter" role="button" aria-expanded="true">Filtro rapido</a>
      <div class="collapse show" id="collapseFileFilter">
        <div class="row">
          <div class="col-md-6 col-xl-3">
            <div class="card" style="cursor:pointer" id="filterCard-allegato"
                 onclick="filtraGriglia('allegato')">
              <div class="card-body">
                <div class="avtar bg-light-primary">
                  <svg class="pc-icon wid-30 hei-30"><use xlink:href="#custom-note-1"></use></svg>
                </div>
                <div class="d-flex align-items-end justify-content-between mt-4">
                  <div><h6 class="mb-1">Documenti</h6>
                    <p class="mb-0" th:text="${currentFolderObj?.numeroAllegati + ' file'}">0 file</p></div>
                  <span class="badge bg-primary f-12"><i class="fas fa-file"></i></span>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="card" style="cursor:pointer" id="filterCard-immagine"
                 onclick="filtraGriglia('immagine')">
              <div class="card-body">
                <div class="avtar bg-light-success">
                  <svg class="pc-icon wid-30 hei-30"><use xlink:href="#custom-image"></use></svg>
                </div>
                <div class="d-flex align-items-end justify-content-between mt-4">
                  <div><h6 class="mb-1">Immagini</h6>
                    <p class="mb-0" th:text="${currentFolderObj?.numeroImmagini + ' file'}">0 file</p></div>
                  <span class="badge bg-success f-12"><i class="fas fa-image"></i></span>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="card"><div class="card-body">
              <h6 class="mb-1">Cartella attuale</h6>
              <h5 class="text-primary mb-0" th:text="${currentFolderObj?.nome ?: 'Root'}">Root</h5>
              <nav class="mt-2" th:if="${folderPath != null and !folderPath.isEmpty()}">
                <ol class="breadcrumb mb-0" style="font-size:11px">
                  <li class="breadcrumb-item">
                    <a th:href="@{/admin/filemanager/1}"><i class="fas fa-home"></i></a>
                  </li>
                  <li th:each="fp : ${folderPath}" class="breadcrumb-item">
                    <a th:href="@{'/admin/filemanager/' + ${fp.id}}" th:text="${fp.nome}">-</a>
                  </li>
                </ol>
              </nav>
            </div></div>
          </div>
        </div>
      </div>

      <hr class="my-3 border border-secondary-subtle"/>

      <div class="row my-2 align-items-center">
        <div class="col">
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <a th:href="@{/admin/filemanager/1}"
               class="btn btn-sm btn-outline-secondary" title="Root">
              <i class="fas fa-home"></i>
            </a>
            <a th:href="@{'/admin/filemanager/' + ${currentFolder}}"
               class="btn btn-sm btn-outline-secondary" title="Aggiorna">
              <i class="fas fa-sync"></i>
            </a>
            <button class="btn btn-sm btn-outline-primary"
                    onclick="FileManager.apriForm('/admin/filemanager/folder/new/'+currentFolder, 'Nuova cartella')">
              <i class="fas fa-folder-plus"></i> Nuova cartella
            </button>
            <button class="btn btn-sm btn-outline-success"
                    onclick="FileManager.apriForm('/admin/filemanager/images/new/'+currentFolder, 'Nuova immagine')">
              <i class="fas fa-image"></i> Nuova immagine
            </button>
            <button class="btn btn-sm btn-outline-info"
                    onclick="FileManager.apriForm('/admin/filemanager/files/new/'+currentFolder, 'Nuovo allegato')">
              <i class="fas fa-file-upload"></i> Nuovo allegato
            </button>
            <button class="btn btn-sm btn-outline-warning" onclick="selezionaTutto()">
              <i class="fas fa-check-square"></i>
            </button>
            <button type="button" class="btn btn-outline-danger btn-sm" id="btnCancella"
                    style="display:none" onclick="cancellaSelezionati()">
              <i class="fas fa-trash me-1"></i> Cancella selezionati
            </button>
          </div>
        </div>
        <div class="col-auto">
          <input type="text" id="searchInput" class="form-control form-control-sm"
                 placeholder="Cerca..." style="width:200px">
        </div>
      </div>

      <div class="fm-wrapper mt-3">
        <div class="fm-sidebar d-none d-lg-block">
          <div class="tree-item" th:classappend="${currentFolder == '1'} ? 'active'">
            <a th:href="@{/admin/filemanager/1}">
              <i class="fas fa-home me-1 text-primary"></i> Root
            </a>
          </div>
          <div class="tree-children">
            <div th:each="f : ${allFolders}" class="tree-item"
                 th:classappend="${currentFolder == f.id.toString()} ? 'active'">
              <a th:href="@{'/admin/filemanager/' + ${f.id}}">
                <i class="fas fa-folder me-1 text-warning"></i>
                <span th:text="${f.nome}">Cartella</span>
              </a>
            </div>
          </div>
        </div>

        <div class="fm-main ps-3">
          <div class="row g-3" id="griglia">

            <!-- SOTTOCARTELLE -->
            <div th:each="sf : ${subfolders}"
                 class="col-6 col-md-4 col-lg-3 col-xl-2"
                 th:id="'fold' + ${sf.id}"
                 th:attr="data-tipo='folder', data-id=${sf.id}, data-nome=${sf.nome}">
              <div class="card file-card-fm border">
                <div class="card-body p-2">
                  <div class="d-flex align-items-center justify-content-between mb-2">
                    <div class="form-check m-0">
                      <input type="checkbox" class="form-check-input inpt_c1" th:value="${sf.id}">
                    </div>
                    <div class="dropdown">
                      <a class="btn btn-link btn-sm p-0 dropdown-toggle arrow-none"
                         href="#" data-bs-toggle="dropdown">
                        <i class="material-icons-two-tone f-16">more_vert</i>
                      </a>
                      <div class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item"
                           th:href="@{'/admin/filemanager/' + ${sf.id}}">
                          <i class="fas fa-folder-open me-2"></i>Apri
                        </a>
                        <a class="dropdown-item" href="javascript:void(0)"
                           th:data-id="${sf.id}"
                           onclick="FileManager.apriForm('/admin/filemanager/folder/'+this.dataset.id+'/edit','Modifica cartella')">
                          <i class="fas fa-edit me-2"></i>Modifica
                        </a>
                        <a class="dropdown-item text-danger" href="javascript:void(0)"
                           th:data-id="${sf.id}"
                           onclick="cancellaFolder(this.dataset.id)">
                          <i class="fas fa-trash me-2"></i>Elimina
                        </a>
                      </div>
                    </div>
                  </div>
                  <div class="file-thumb mb-2"
                       th:data-id="${sf.id}"
                       onclick="location.href='/admin/filemanager/'+this.dataset.id">
                    <i class="fas fa-folder fa-3x text-warning"></i>
                  </div>
                  <h6 class="mb-0 text-truncate" style="font-size:12px" th:text="${sf.nome}">Cartella</h6>
                </div>
              </div>
            </div>

            <!-- IMMAGINI -->
            <div th:each="imm : ${images}"
                 class="col-6 col-md-4 col-lg-3 col-xl-2"
                 th:id="'imm' + ${imm.id}"
                 th:attr="data-tipo='immagine', data-id=${imm.id}, data-nome=${imm.name}">
              <div class="card file-card-fm border">
                <div class="card-body p-2">
                  <div class="d-flex align-items-center justify-content-between mb-2">
                    <div class="form-check m-0">
                      <input type="checkbox" class="form-check-input inpt_c1" th:value="${imm.id}">
                    </div>
                    <div class="dropdown">
                      <a class="btn btn-link btn-sm p-0 dropdown-toggle arrow-none"
                         href="#" data-bs-toggle="dropdown">
                        <i class="material-icons-two-tone f-16">more_vert</i>
                      </a>
                      <div class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item" href="javascript:void(0)"
                           th:data-id="${imm.id}"
                           onclick="FileManager.apriForm('/admin/filemanager/images/'+this.dataset.id+'/edit/'+currentFolder,'Modifica immagine')">
                          <i class="fas fa-edit me-2"></i>Modifica
                        </a>
                        <a class="dropdown-item text-danger" href="javascript:void(0)"
                           th:data-id="${imm.id}"
                           onclick="cancellaImmagine(this.dataset.id)">
                          <i class="fas fa-trash me-2"></i>Elimina
                        </a>
                      </div>
                    </div>
                  </div>
                  <div class="file-thumb mb-2"
                       th:data-src="${config.imagesRepositoryWeb + imm.fullpath}"
                       th:data-nome="${imm.name}"
                       onclick="apriLightbox(this.dataset.src, this.dataset.nome)"
                       style="cursor:pointer">
                    <img th:src="${config.imagesRepositoryWeb + imm.fullpath}"
                         th:alt="${imm.name}"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
                         style="border-radius:4px">
                    <div style="display:none;align-items:center;justify-content:center;width:100%;height:100%">
                      <i class="fas fa-image fa-2x text-muted"></i>
                    </div>
                  </div>
                  <h6 class="mb-0 text-truncate" style="font-size:11px" th:text="${imm.name}">nome</h6>
                  <small class="text-muted" th:text="${imm.KSize + ' Kb'}">0 Kb</small>
                </div>
              </div>
            </div>

            <!-- ALLEGATI -->
            <div th:each="all : ${allegati}"
                 class="col-6 col-md-4 col-lg-3 col-xl-2"
                 th:id="'all' + ${all.id}"
                 th:attr="data-tipo='allegato', data-id=${all.id}, data-nome=${all.l1}">
              <div class="card file-card-fm border">
                <div class="card-body p-2">
                  <div class="d-flex align-items-center justify-content-between mb-2">
                    <div class="form-check m-0">
                      <input type="checkbox" class="form-check-input inpt_c1" th:value="${all.id}">
                    </div>
                    <div class="dropdown">
                      <a class="btn btn-link btn-sm p-0 dropdown-toggle arrow-none"
                         href="#" data-bs-toggle="dropdown">
                        <i class="material-icons-two-tone f-16">more_vert</i>
                      </a>
                      <div class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item"
                           th:href="@{/admin/filemanager/files/{id}/download(id=${all.id})}"
                           target="_blank">
                          <i class="fas fa-download me-2"></i>Scarica
                        </a>
                        <a class="dropdown-item" href="javascript:void(0)"
                           th:data-id="${all.id}"
                           onclick="FileManager.apriForm('/admin/filemanager/files/'+this.dataset.id+'/edit/'+currentFolder,'Modifica allegato')">
                          <i class="fas fa-edit me-2"></i>Modifica
                        </a>
                        <a class="dropdown-item text-danger" href="javascript:void(0)"
                           th:data-id="${all.id}"
                           onclick="cancellaAllegato(this.dataset.id)">
                          <i class="fas fa-trash me-2"></i>Elimina
                        </a>
                      </div>
                    </div>
                  </div>
                  <div class="file-thumb mb-2">
                    <img th:src="@{'/manager/assets/img/filetypes/32/' + ${all.type} + '.png'}"
                         th:alt="${all.type}"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
                         style="max-width:48px;max-height:48px">
                    <div style="display:none" class="text-muted">
                      <i class="fas fa-file-alt fa-3x"></i>
                    </div>
                  </div>
                  <h6 class="mb-0 text-truncate" style="font-size:11px" th:text="${all.l1}">nome</h6>
                  <small class="text-muted" th:text="${all.sizeKB + ' Kb'}">0 Kb</small>
                </div>
              </div>
            </div>

            <div th:if="${#lists.isEmpty(subfolders) and #lists.isEmpty(images) and #lists.isEmpty(allegati)}"
                 class="col-12 text-center py-5 text-muted">
              <i class="fas fa-folder-open fa-3x mb-3"></i>
              <p>Cartella vuota</p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalAccount" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalAccountTitle">Caricamento...</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalAccountBody">
          <div class="text-center p-4"><div class="spinner-border text-info"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalLightbox" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content bg-dark border-0">
        <div class="modal-header border-0 pb-0">
          <h6 class="modal-title text-white" id="lightboxNome"></h6>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center p-4">
          <img id="lightboxImg" src="" class="img-fluid rounded shadow" style="max-height: 80vh;">
        </div>
      </div>
    </div>
  </div>

</div>

<th:block layout:fragment="scripts">
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        var searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                var q = this.value.toLowerCase();
                document.querySelectorAll('[data-nome]').forEach(function(el) {
                    var nome = (el.getAttribute('data-nome') || '').toLowerCase();
                    el.style.display = nome.includes(q) ? '' : 'none';
                });
            });
        }
    });
  </script>
</th:block>

</body>
</html>
