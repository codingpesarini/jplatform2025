<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>
<div th:fragment="content">
  <style>
    .pop-wrapper { display:flex; height:700px; }
    .pop-sidebar { width:210px; border-right:1px solid #dee2e6; overflow-y:auto; padding:8px 0; flex-shrink:0; }
    .pop-main { flex:1; overflow-y:auto; padding:8px; }

    .pop-tree-item {
      padding:4px 10px;
      font-size:12px;
      border-left:3px solid transparent;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:4px;
    }
    .pop-tree-item:hover { background:#f8f9fa; border-left-color:#0d6efd; }
    .pop-tree-item a { color:#333; text-decoration:none; flex:1; }
    .pop-tree-item.active { background:#e7f1ff; border-left-color:#0d6efd; font-weight:600; }

    .pop-toggle {
      cursor:pointer;
      width:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#6c757d;
      flex-shrink:0;
      transition:transform 0.2s;
    }
    .pop-toggle.open { transform:rotate(90deg); }
    .pop-toggle i { font-size:10px; }

    .pop-tree-children {
      padding-left:20px;
      border-left:1px dashed #dee2e6;
      margin-left:18px;
      display:none;
    }

    .pop-thumb { display:inline-flex; flex-direction:column; align-items:center;
                 width:110px; margin:4px; vertical-align:top; cursor:pointer; position:relative; }
    .pop-thumb-box { width:100px; height:90px; border:2px solid #dee2e6; border-radius:6px;
                     display:flex; align-items:center; justify-content:center;
                     background:#f8f9fa; overflow:hidden; transition:border-color .2s; }
    .pop-thumb-box:hover { border-color:#0d6efd; }
    .pop-thumb-name { font-size:10px; text-align:center; width:100px; overflow:hidden;
                      text-overflow:ellipsis; white-space:nowrap; margin-top:3px; color:#555; }
    .pop-thumb-menu { position:absolute; top:0; right:4px; z-index:10; }

    .pop-toolbar { padding:6px 8px; border-bottom:1px solid #dee2e6; display:flex;
                   align-items:center; gap:6px; flex-wrap:wrap; }
    .pop-search { width:130px; font-size:12px; }
    .pop-folder-drag { cursor:grab; }
    .pop-drag-over .pop-thumb-box { border-color:#0d6efd !important; background:#e7f1ff !important; }
    #popGriglia.dragging [draggable="true"] * { pointer-events: none; }

    /* Selezione multipla */
    .pop-selected .pop-thumb-box {
      border-color:#0d6efd !important;
      background:#e7f1ff !important;
    }
    .pop-check {
      display:none;
      position:absolute;
      top:4px; left:4px;
      background:#0d6efd;
      color:#fff;
      border-radius:50%;
      width:18px; height:18px;
      font-size:11px;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      z-index:5;
      pointer-events:none;
    }
    .pop-selected .pop-check { display:flex; }

    /* Vista lista */
    #popGriglia.pop-view-list { display:block; }
    #popGriglia.pop-view-list .pop-thumb {
      display:flex;
      flex-direction:row;
      width:100%;
      align-items:center;
      gap:8px;
      margin:2px 0;
      border-bottom:1px solid #f0f0f0;
      padding:4px 6px;
      box-sizing:border-box;
    }
    #popGriglia.pop-view-list .pop-thumb-box {
      width:36px;
      height:36px;
      flex-shrink:0;
    }
    #popGriglia.pop-view-list .pop-thumb-name {
      width:auto;
      flex:1;
      text-align:left;
      white-space:normal;
      font-size:12px;
    }
    #popGriglia.pop-view-list .pop-thumb-menu {
      position:static;
    }
  </style>

  <script th:inline="javascript">
    var _popTipo   = /*[[${tipo}]]*/ 'tutti';
    var _popFolder = /*[[${currentFolder}]]*/ '1';
  </script>

  <div class="pop-toolbar">
    <button class="btn btn-sm btn-outline-secondary" style="font-size:12px"
            onclick="popNavigate('1')">
      <i class="fas fa-home"></i>
    </button>
    <button class="btn btn-sm btn-outline-secondary" style="font-size:12px"
            onclick="popNavigate(_popFolder)">
      <i class="fas fa-sync"></i>
    </button>
    <button th:if="${tipo == 'immagini' or tipo == 'tutti'}"
            class="btn btn-sm btn-outline-success" style="font-size:12px"
            th:data-folder="${currentFolder}"
            onclick="FileManager.apriForm('/admin/filemanager/images/new/'+this.dataset.folder,'Nuova immagine')">
      <i class="fas fa-image"></i> Immagine
    </button>
    <button th:if="${tipo == 'allegati' or tipo == 'tutti'}"
            class="btn btn-sm btn-outline-info" style="font-size:12px"
            th:data-folder="${currentFolder}"
            onclick="FileManager.apriForm('/admin/filemanager/files/new/'+this.dataset.folder,'Nuovo allegato')">
      <i class="fas fa-file-upload"></i> Allegato
    </button>
    <input type="text" id="popSearchInput" class="form-control form-control-sm pop-search"
           placeholder="Cerca..." oninput="popFiltra(this.value)">

    <!-- Pulsante inserisci selezionati -->
    <button class="btn btn-sm btn-primary" id="btnInserisciSelezionati"
            style="display:none" onclick="popInserisciSelezionati()">
      <i class="fas fa-check me-1"></i> Inserisci (<span id="popCountSelezionati">0</span>)
    </button>

    <!-- Switcher vista -->
    <div class="d-flex gap-1 ms-auto">
      <button class="btn btn-sm btn-outline-secondary active" id="popViewGrid"
              onclick="popSetView('grid')" title="Griglia">
        <i class="ti ti-layout-grid"></i>
      </button>
      <button class="btn btn-sm btn-outline-secondary" id="popViewList"
              onclick="popSetView('list')" title="Lista">
        <i class="ti ti-layout-list"></i>
      </button>
    </div>
    <span class="text-muted" style="font-size:11px"
          th:text="${currentFolderObj?.nome ?: 'Root'}">Root</span>
  </div>

  <div class="pop-wrapper">

    <!-- Sidebar albero -->
    <div class="pop-sidebar">
      <div class="pop-tree-item" th:classappend="${currentFolder == '1'} ? 'active'">
        <span style="width:16px;display:inline-block;flex-shrink:0"></span>
        <a href="javascript:void(0)" onclick="popNavigate('1')">
          <i class="fas fa-home me-1 text-primary"></i> Root
        </a>
      </div>
      <th:block th:each="f : ${allFolders}">
        <div class="pop-tree-item"
             th:classappend="${currentFolder == f.id.toString()} ? 'active'">
          <span th:if="${f.hasSubfolders()}"
                class="pop-toggle"
                onclick="popToggleTree(this)">
            <i class="fas fa-chevron-right"></i>
          </span>
          <span th:unless="${f.hasSubfolders()}"
                style="width:16px;display:inline-block;flex-shrink:0"></span>
          <a href="javascript:void(0)"
             th:data-id="${f.id}"
             onclick="popNavigate(this.dataset.id)">
            <i class="fas fa-folder me-1 text-warning"></i>
            <span th:text="${f.nome}">Cartella</span>
          </a>
        </div>
        <div class="pop-tree-children"
             th:if="${f.hasSubfolders() and !#lists.isEmpty(f.subfolder)}">
          <div th:each="subf : ${f.subfolder}"
               class="pop-tree-item"
               th:classappend="${currentFolder == subf.id.toString()} ? 'active'">
            <span th:if="${subf.hasSubfolders()}"
                  class="pop-toggle"
                  onclick="popToggleTree(this)">
              <i class="fas fa-chevron-right"></i>
            </span>
            <span th:unless="${subf.hasSubfolders()}"
                  style="width:16px;display:inline-block;flex-shrink:0"></span>
            <a href="javascript:void(0)"
               th:data-id="${subf.id}"
               onclick="popNavigate(this.dataset.id)">
              <i class="fas fa-folder me-1 text-warning"></i>
              <span th:text="${subf.nome}">Sottocartella</span>
            </a>
          </div>
        </div>
      </th:block>
    </div>

    <!-- Griglia -->
    <div class="pop-main" id="popGriglia" ondragover="event.preventDefault()">

      <!-- CARTELLE -->
      <div th:each="sf : ${subfolders}"
           class="pop-thumb pop-folder-drag"
           draggable="true"
           th:attr="data-id=${sf.id},data-tipo='folder',data-nome=${sf.nome}">
        <div class="pop-thumb-menu dropdown">
          <a class="btn btn-link btn-sm p-0 dropdown-toggle arrow-none"
             href="#" data-bs-toggle="dropdown" onclick="event.stopPropagation()">
            <i class="material-icons-two-tone f-16">more_vert</i>
          </a>
          <div class="dropdown-menu dropdown-menu-end">
            <a class="dropdown-item" href="javascript:void(0)"
               th:data-id="${sf.id}"
               onclick="popNavigate(this.dataset.id)">
              <i class="fas fa-folder-open me-2"></i>Apri
            </a>
            <a class="dropdown-item" href="javascript:void(0)"
               th:data-id="${sf.id}"
               th:data-nome="${sf.nome}"
               onclick="apriModalSpostaPopup(this.dataset.id, this.dataset.nome, 'folder')">
              <i class="fas fa-arrows-alt me-2"></i>Sposta
            </a>
            <a class="dropdown-item text-danger" href="javascript:void(0)"
               th:data-id="${sf.id}"
               onclick="cancellaFolder(this.dataset.id)">
              <i class="fas fa-trash me-2"></i>Elimina
            </a>
          </div>
        </div>
        <div class="pop-thumb-box"
             th:data-id="${sf.id}"
             onclick="popNavigate(this.dataset.id)">
          <i class="fas fa-folder fa-2x text-warning"></i>
        </div>
        <div class="pop-thumb-name" th:text="${sf.nome}">Cartella</div>
      </div>

      <!-- IMMAGINI -->
      <th:block th:if="${tipo == 'immagini' or tipo == 'tutti'}">
        <div th:each="imm : ${images}"
             class="pop-thumb"
             draggable="true"
             th:attr="data-id=${imm.id},data-tipo='image',data-nome=${imm.name}">
          <div class="pop-thumb-menu dropdown">
            <a class="btn btn-link btn-sm p-0 dropdown-toggle arrow-none"
               href="#" data-bs-toggle="dropdown" onclick="event.stopPropagation()">
              <i class="material-icons-two-tone f-16">more_vert</i>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <a class="dropdown-item" href="javascript:void(0)"
                 th:data-id="${imm.id}"
                 th:data-nome="${imm.name}"
                 onclick="apriModalSpostaPopup(this.dataset.id, this.dataset.nome, 'image')">
                <i class="fas fa-arrows-alt me-2"></i>Sposta
              </a>
              <a class="dropdown-item text-danger" href="javascript:void(0)"
                 th:data-id="${imm.id}"
                 onclick="cancellaImmagine(this.dataset.id)">
                <i class="fas fa-trash me-2"></i>Elimina
              </a>
            </div>
          </div>
          <span class="pop-check">✓</span>
          <div class="pop-thumb-box"
               th:data-src="${config.imagesRepositoryWeb + imm.fullpath}"
               th:data-id="${imm.id}"
               th:data-nome="${imm.name}"
               onclick="popToggleSelect(this, 'image')">
            <img th:src="${config.imagesRepositoryWeb + imm.fullpath}"
                 style="max-width:100%;max-height:90px;object-fit:cover"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <i class="fas fa-image fa-2x text-muted" style="display:none"></i>
          </div>
          <div class="pop-thumb-name" th:text="${imm.name}">nome</div>
        </div>
      </th:block>

      <!-- ALLEGATI -->
      <th:block th:if="${tipo == 'allegati' or tipo == 'tutti'}">
        <div th:each="all : ${allegati}"
             class="pop-thumb"
             draggable="true"
             th:attr="data-id=${all.id},data-tipo='file',data-nome=${all.l1}">
          <div class="pop-thumb-menu dropdown">
            <a class="btn btn-link btn-sm p-0 dropdown-toggle arrow-none"
               href="#" data-bs-toggle="dropdown" onclick="event.stopPropagation()">
              <i class="material-icons-two-tone f-16">more_vert</i>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <a class="dropdown-item" href="javascript:void(0)"
                 th:data-id="${all.id}"
                 th:data-nome="${all.l1}"
                 onclick="apriModalSpostaPopup(this.dataset.id, this.dataset.nome, 'file')">
                <i class="fas fa-arrows-alt me-2"></i>Sposta
              </a>
              <a class="dropdown-item text-danger" href="javascript:void(0)"
                 th:data-id="${all.id}"
                 onclick="cancellaAllegato(this.dataset.id)">
                <i class="fas fa-trash me-2"></i>Elimina
              </a>
            </div>
          </div>
          <span class="pop-check">✓</span>
          <div class="pop-thumb-box"
               th:data-id="${all.id}"
               th:data-l1="${all.l1}"
               th:data-type="${all.type}"
               onclick="popToggleSelect(this, 'file')">
            <i class="fas fa-file fa-2x text-secondary"></i>
          </div>
          <div class="pop-thumb-name" th:text="${all.l1}">nome</div>
        </div>
      </th:block>

      <div th:if="${#lists.isEmpty(subfolders)
                   and (tipo == 'allegati' ? #lists.isEmpty(allegati) : true)
                   and (tipo == 'immagini' ? #lists.isEmpty(images) : true)
                   and (tipo == 'tutti' ? (#lists.isEmpty(images) and #lists.isEmpty(allegati)) : true)}"
           style="padding:40px;text-align:center;color:#aaa;width:100%">
        <i class="fas fa-folder-open fa-2x mb-2"></i>
        <p>Cartella vuota</p>
      </div>

    </div>
  </div>

  <!-- Modal Sposta interno al popup -->
  <div id="modalSpostaPopup" class="modal fade" tabindex="-1" style="z-index:9999">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title">Sposta: <strong id="popSpostaNome"></strong></h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <select id="popSpostaSelect" class="form-select form-select-sm">
            <option value="">-- Seleziona cartella --</option>
          </select>
        </div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-primary btn-sm" onclick="confermaSpostaPopup()">
            <i class="fas fa-arrows-alt me-1"></i> Sposta
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container-pop"
       class="toast-container position-fixed bottom-0 end-0 p-3"
       style="z-index:9999">
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal-pop" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Conferma</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="confirmModalMessage-pop">Sei sicuro di voler procedere?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-danger" id="confirmModalBtn-pop">Conferma</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var _popSpostaId   = null;
    var _popSpostaTipo = null;
    var _popSelezionati = {};

    function apriModalSpostaPopup(id, nome, tipo) {
    _popSpostaId   = id;
    _popSpostaTipo = tipo;
    document.getElementById('popSpostaNome').textContent = nome;

    fetch('/admin/filemanager/api/folders/all')
        .then(function(r) { return r.json(); })
        .then(function(folders) {
            var select = document.getElementById('popSpostaSelect');
            select.innerHTML = '<option value="">-- Seleziona cartella --</option>';
            folders.forEach(function(f) {
                var opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = f.nome;
                select.appendChild(opt);
            });
        });

    bootstrap.Modal.getOrCreateInstance(document.getElementById('modalSpostaPopup')).show();
}

    function confermaSpostaPopup() {
        var targetId = document.getElementById('popSpostaSelect').value;
        if (!targetId) { alert('Seleziona una cartella di destinazione.'); return; }
        if (targetId === _popSpostaId && _popSpostaTipo === 'folder') {
            alert('Non puoi spostare una cartella in se stessa.');
            return;
        }
        var params = new URLSearchParams();
        params.append('elementId', _popSpostaId);
        params.append('targetFolderId', targetId);
        params.append('type', _popSpostaTipo);

        fetch('/admin/filemanager/move-element', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        }).then(function(res) {
            bootstrap.Modal.getInstance(document.getElementById('modalSpostaPopup')).hide();
            if (res.ok) popNavigate(_popFolder);
            else alert('Errore durante lo spostamento.');
        });
    }

    function popSetView(view) {
        var griglia = document.getElementById('popGriglia');
        if (view === 'list') {
            griglia.classList.add('pop-view-list');
            document.getElementById('popViewList').classList.add('active');
            document.getElementById('popViewGrid').classList.remove('active');
        } else {
            griglia.classList.remove('pop-view-list');
            document.getElementById('popViewGrid').classList.add('active');
            document.getElementById('popViewList').classList.remove('active');
        }
    }

    function popNavigate(folderId) {
        _popFolder = folderId;
        var modalBody = document.getElementById('modalAccountBody');
        if (!modalBody) return;
        modalBody.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-info"></div></div>';
        fetch('/admin/filemanager/popup/' + folderId + '/' + _popTipo)
            .then(function(r) { return r.text(); })
            .then(function(html) { $(modalBody).html(html); });
    }

    function popFiltra(q) {
        q = q.toLowerCase();
        document.querySelectorAll('#popGriglia .pop-thumb').forEach(function(el) {
            var nome = (el.getAttribute('data-nome') || '').toLowerCase();
            el.style.display = nome.includes(q) ? '' : 'none';
        });
    }

    function popToggleTree(btn) {
        var treeItem = btn.closest('.pop-tree-item');
        var children = treeItem.nextElementSibling;
        if (!children || !children.classList.contains('pop-tree-children')) return;
        var isOpen = children.style.display !== 'none';
        children.style.display = isOpen ? 'none' : 'block';
        btn.classList.toggle('open', !isOpen);
    }

    // Selezione multipla
    function popToggleSelect(box, tipo) {
        var thumb = box.closest('.pop-thumb');
        if (!thumb) return;
        var id = thumb.getAttribute('data-id');

        if (_popSelezionati[id]) {
            delete _popSelezionati[id];
            thumb.classList.remove('pop-selected');
        } else {
            var entry = { tipo: tipo };
            if (tipo === 'image') {
                entry.src  = box.getAttribute('data-src');
                entry.nome = box.getAttribute('data-nome') || '';
            } else {
                entry.l1   = box.getAttribute('data-l1')  || '';
                entry.type = box.getAttribute('data-type') || '';
            }
            _popSelezionati[id] = entry;
            thumb.classList.add('pop-selected');
        }

        var count = Object.keys(_popSelezionati).length;
        var btn   = document.getElementById('btnInserisciSelezionati');
        var lbl   = document.getElementById('popCountSelezionati');
        if (btn) btn.style.display = count > 0 ? '' : 'none';
        if (lbl) lbl.textContent   = count;
    }

    function popInserisciSelezionati() {
        Object.keys(_popSelezionati).forEach(function(id) {
            var item = _popSelezionati[id];
            if (item.tipo === 'image') {
                if (typeof window.InserisciImmagineLibreria === 'function') {
                    window.InserisciImmagineLibreria(item.src, id, '');
                }
            } else {
                if (typeof window.CollegaAllegatoDaLibreria === 'function') {
                    window.CollegaAllegatoDaLibreria(id, item.l1, item.type);
                }
            }
        });

        _popSelezionati = {};
        bootstrap.Modal.getInstance(document.getElementById('modalAccount')).hide();
        if (typeof showToast === 'function') {
            showToast('Aggiunto', 'Elementi aggiunti. Salva la sezione per confermare.');
        }
    }

    // Drag & Drop
    (function() {
        var griglia = document.getElementById('popGriglia');
        if (!griglia) return;
        var draggingId = null;
        var draggingType = null;

        griglia.addEventListener('dragstart', function(e) {
            var el = e.target.closest('[draggable="true"]');
            if (!el) return;
            draggingId   = el.getAttribute('data-id');
            draggingType = el.getAttribute('data-tipo');
            el.style.opacity = '0.4';
            e.dataTransfer.effectAllowed = 'move';
            griglia.classList.add('dragging');
        });

        griglia.addEventListener('dragover', function(e) {
            e.preventDefault();
            var folder = e.target.closest('.pop-folder-drag');
            document.querySelectorAll('.pop-drag-over').forEach(function(x) { x.classList.remove('pop-drag-over'); });
            if (folder) folder.classList.add('pop-drag-over');
        });

        griglia.addEventListener('dragend', function(e) {
            var el = e.target.closest('[draggable="true"]');
            if (el) el.style.opacity = '1';
            griglia.classList.remove('dragging');
            document.querySelectorAll('.pop-drag-over').forEach(function(x) { x.classList.remove('pop-drag-over'); });
        });

        griglia.addEventListener('drop', function(e) {
            e.preventDefault();
            var folder = e.target.closest('.pop-folder-drag');
            if (!folder) return;
            var targetId = folder.getAttribute('data-id');
            document.querySelectorAll('.pop-drag-over').forEach(function(x) { x.classList.remove('pop-drag-over'); });
            if (draggingId === targetId && draggingType === 'folder') return;

            if (confirm('Spostare l\'elemento in questa cartella?')) {
                var params = new URLSearchParams();
                params.append('elementId', draggingId);
                params.append('targetFolderId', targetId);
                params.append('type', draggingType);
                fetch('/admin/filemanager/move-element', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                }).then(function(res) {
                    if (res.ok) popNavigate(_popFolder);
                    else alert('Errore durante lo spostamento.');
                });
            }
        });
    })();
  </script>
</div>
</body>
</html>
