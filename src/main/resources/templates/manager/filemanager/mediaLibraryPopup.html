<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>
<div th:fragment="content">
  <style>
    .pop-wrapper { display:flex; height:520px; }
    .pop-sidebar { width:180px; border-right:1px solid #dee2e6; overflow-y:auto; padding:8px 0; flex-shrink:0; }
    .pop-main { flex:1; overflow-y:auto; padding:8px; }
    .pop-tree-item { padding:4px 10px; font-size:12px; border-left:3px solid transparent; cursor:pointer; }
    .pop-tree-item:hover { background:#f8f9fa; border-left-color:#0d6efd; }
    .pop-tree-item a { color:#333; text-decoration:none; display:block; }
    .pop-tree-item.active { background:#e7f1ff; border-left-color:#0d6efd; font-weight:600; }
    .pop-thumb { display:inline-flex; flex-direction:column; align-items:center;
                 width:110px; margin:4px; vertical-align:top; cursor:pointer; }
    .pop-thumb-box { width:100px; height:90px; border:2px solid #dee2e6; border-radius:6px;
                     display:flex; align-items:center; justify-content:center;
                     background:#f8f9fa; overflow:hidden; transition:border-color .2s; }
    .pop-thumb-box:hover { border-color:#0d6efd; }
    .pop-thumb-name { font-size:10px; text-align:center; width:100px; overflow:hidden;
                      text-overflow:ellipsis; white-space:nowrap; margin-top:3px; color:#555; }
    .pop-toolbar { padding:6px 8px; border-bottom:1px solid #dee2e6; display:flex;
                   align-items:center; gap:6px; flex-wrap:wrap; }
    .pop-search { width:160px; font-size:12px; }
  </style>

  <script th:inline="javascript">
    var _popTipo      = /*[[${tipo}]]*/ 'tutti';
    var _popFolder    = /*[[${currentFolder}]]*/ '1';
  </script>

  <div class="pop-toolbar">
    <button class="btn btn-sm btn-outline-secondary" style="font-size:12px"
            onclick="popNavigate('1')">
      <i class="fas fa-home"></i>
    </button>
    <button class="btn btn-sm btn-outline-secondary" style="font-size:12px"
            onclick="popNavigate(_popFolder)">
      <i class="fas fa-sync"></i>
    </button>
    <!-- Pulsante Nuova immagine solo se tipo è immagini o tutti -->
    <button th:if="${tipo == 'immagini' or tipo == 'tutti'}"
            class="btn btn-sm btn-outline-success" style="font-size:12px"
            th:data-folder="${currentFolder}"
            onclick="FileManager.apriForm('/admin/filemanager/images/new/'+this.dataset.folder,'Nuova immagine')">
      <i class="fas fa-image"></i> Immagine
    </button>
    <!-- Pulsante Nuovo allegato solo se tipo è allegati o tutti -->
    <button th:if="${tipo == 'allegati' or tipo == 'tutti'}"
            class="btn btn-sm btn-outline-info" style="font-size:12px"
            th:data-folder="${currentFolder}"
            onclick="FileManager.apriForm('/admin/filemanager/files/new/'+this.dataset.folder,'Nuovo allegato')">
      <i class="fas fa-file-upload"></i> Allegato
    </button>
    <input type="text" id="popSearchInput" class="form-control form-control-sm pop-search"
           placeholder="Cerca..." oninput="popFiltra(this.value)">
    <span class="ms-auto text-muted" style="font-size:11px"
          th:text="${currentFolderObj?.nome ?: 'Root'}">Root</span>
  </div>

  <div class="pop-wrapper">

    <!-- Sidebar -->
    <div class="pop-sidebar">
      <div class="pop-tree-item" th:classappend="${currentFolder == '1'} ? 'active'">
        <a href="javascript:void(0)" onclick="popNavigate('1')">
          <i class="fas fa-home me-1 text-primary"></i> Root
        </a>
      </div>
      <div th:each="f : ${allFolders}"
           class="pop-tree-item"
           th:classappend="${currentFolder == f.id.toString()} ? 'active'">
        <a href="javascript:void(0)"
           th:data-id="${f.id}"
           onclick="popNavigate(this.dataset.id)">
          <i class="fas fa-folder me-1 text-warning"></i>
          <span th:text="${f.nome}">Cartella</span>
        </a>
      </div>
    </div>

    <!-- Griglia -->
    <div class="pop-main" id="popGriglia">

      <!-- CARTELLE — sempre visibili -->
      <div th:each="sf : ${subfolders}"
           class="pop-thumb"
           th:attr="data-nome=${sf.nome}">
        <div class="pop-thumb-box"
             th:data-id="${sf.id}"
             onclick="popNavigate(this.dataset.id)">
          <i class="fas fa-folder fa-2x text-warning"></i>
        </div>
        <div class="pop-thumb-name" th:text="${sf.nome}">Cartella</div>
      </div>

      <!-- IMMAGINI — solo se tipo è 'immagini' o 'tutti' -->
      <th:block th:if="${tipo == 'immagini' or tipo == 'tutti'}">
        <div th:each="imm : ${images}"
             class="pop-thumb"
             th:attr="data-nome=${imm.name}">
          <div class="pop-thumb-box"
               th:data-src="${config.imagesRepositoryWeb + imm.fullpath}"
               th:data-id="${imm.id}"
               th:data-nome="${imm.name}"
               onclick="popSelezionaImmagine(this.dataset.src, this.dataset.id, this.dataset.nome)">
            <img th:src="${config.imagesRepositoryWeb + imm.fullpath}"
                 style="max-width:100%;max-height:90px;object-fit:cover"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <i class="fas fa-image fa-2x text-muted" style="display:none"></i>
          </div>
          <div class="pop-thumb-name" th:text="${imm.name}">nome</div>
        </div>
      </th:block>

      <!-- ALLEGATI — solo se tipo è 'allegati' o 'tutti' -->
      <th:block th:if="${tipo == 'allegati' or tipo == 'tutti'}">
        <div th:each="all : ${allegati}"
             class="pop-thumb"
             th:attr="data-nome=${all.l1}">
          <div class="pop-thumb-box"
               th:data-id="${all.id}"
               th:data-l1="${all.l1}"
               th:data-l2="${all.l2}"
               th:data-type="${all.type}"
               onclick="popSelezionaAllegato(this.dataset.id, this.dataset.l1, this.dataset.l2, this.dataset.type)">
            <img th:src="@{'/manager/assets/img/filetypes/32/' + ${all.type} + '.png'}"
                 style="max-width:48px;max-height:48px"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <i class="fas fa-file fa-2x text-muted" style="display:none"></i>
          </div>
          <div class="pop-thumb-name" th:text="${all.l1}">nome</div>
        </div>
      </th:block>

      <!-- Cartella vuota -->
      <div th:if="${#lists.isEmpty(subfolders)
                   and (tipo == 'allegati' ? #lists.isEmpty(allegati) : true)
                   and (tipo == 'immagini' ? #lists.isEmpty(images) : true)
                   and (tipo == 'tutti' ? (#lists.isEmpty(images) and #lists.isEmpty(allegati)) : true)}"
           style="padding:40px;text-align:center;color:#aaa;width:100%">
        <i class="fas fa-folder-open fa-2x mb-2"></i>
        <p>Cartella vuota</p>
      </div>

    </div>
  </div>

  <script>
    function popNavigate(folderId) {
        var modalBody = document.getElementById('modalAccountBody');
        if (!modalBody) return;
        modalBody.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-info"></div></div>';
        fetch('/admin/filemanager/popup/' + folderId + '/' + _popTipo)
            .then(function(r) { return r.text(); })
            .then(function(html) { $(modalBody).html(html); });
    }

    function popFiltra(q) {
        q = q.toLowerCase();
        document.querySelectorAll('#popGriglia .pop-thumb').forEach(function(el) {
            var nome = (el.getAttribute('data-nome') || '').toLowerCase();
            el.style.display = nome.includes(q) ? '' : 'none';
        });
    }

    function popSelezionaImmagine(src, id, nome) {
        if (typeof window.InserisciImmagineLibreria === 'function') {
            window.InserisciImmagineLibreria(src, id, '');
        }
        bootstrap.Modal.getInstance(document.getElementById('modalAccount')).hide();
    }

    function popSelezionaAllegato(id, l1, l2, type) {
        if (typeof window.InserisciAllegatoLibreria === 'function') {
            window.InserisciAllegatoLibreria(id, l2, l1, type, '');
        }
        bootstrap.Modal.getInstance(document.getElementById('modalAccount')).hide();
    }
  </script>
</div>
</body>
</html>
