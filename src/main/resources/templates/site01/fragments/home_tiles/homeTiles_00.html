<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="homeTiles_00">
    <section class="section">
        <div class="hero-img d-none d-md-block">

            <!-- equivalente di: logic:iterate length="1" su contenutiFront10 -->
            <th:block th:if="${config != null
                       and config.contenutiFront10 != null
                       and !#lists.isEmpty(config.contenutiFront10)}"
                      th:with="articolo=${config.contenutiFront10[0]}">

                <img class="d-block w-100"
                     th:src="${config.imagesRepositoryWeb + articolo.logo}"
                     th:alt="${articolo.titolo}" />

                <!-- nel JSP stampavi testo “raw”, quindi qui uso utext -->
                <div class="carousel-caption d-none d-md-block"
                     th:utext="${articolo.testo}">
                </div>

            </th:block>

        </div>
    </section>
</th:block>
