<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="homeTiles_02">

    <section class="section bg-white py-2 py-lg-3 py-xl-5">
        <div class="container">
            <div class="it-carousel-wrapper it-carousel-landscape-abstract-three-cols splide" data-bs-carousel-splide>
                <div class="row variable-gutters">
                    <div class="col-lg-12">
                        <div class="title-section pb-4">
                            <h2>Le ultime Notizie</h2>
                        </div>

                        <div class="splide__track">
                            <ul class="splide__list it-carousel-all">

                                <th:block th:if="${config != null and config.contenutiFront03 != null}">
                                    <th:block th:each="articolo : ${config.contenutiFront03}">
                                        <li class="splide__slide">
                                            <div class="card card-bg card-vertical-thumb bg-white card-thumb-rounded">
                                                <div class="card-body">
                                                    <div class="card-content">
                                                        <h3 class="h5">
                                                            <a th:href="${articolo.url}" th:text="${articolo.titolo}">Titolo</a>
                                                        </h3>
                                                        <small class="h6 text-greendark" th:text="${articolo.dataVisualizzata}">Data</small>
                                                        <p class="text-normal" th:text="${articolo.riassunto}">Riassunto</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </li>
                                    </th:block>
                                </th:block>

                            </ul>
                        </div>

                        <div class="py-4">
                            <a aria-label="Leggi tutte le circolari"
                               class="text-underline"
                               href="page/1/561/1/2021/Le_notizie">
                                <strong>Leggi tutte</strong>
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

</th:block>
