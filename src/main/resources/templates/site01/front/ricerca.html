<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{site01/layout/template}">

<body>

<!-- QUESTO È FONDAMENTALE -->
<th:block layout:fragment="content">

  <div class="section bg-white py-5">
    <div class="container">

      <h1 class="mb-3">Risultato della ricerca</h1>

      <p class="text-muted" th:if="${campo1 != null && !campo1.isEmpty()}">
        Trovati <strong th:text="${resultsCount}">0</strong> risultati per la ricerca di
        <strong th:text="${campo1}">testo</strong>
      </p>

      <!-- form ricerca -->
      <form class="d-flex align-items-center gap-3 mb-4" th:action="@{/ricerca}" method="get">
        <input type="hidden" name="site" th:value="${config.sito.id}" />

        <input class="form-control"
               type="text"
               name="campo1"
               placeholder="Cerca..."
               th:value="${campo1}" />
        <button class="btn btn-success" type="submit">Ricerca</button>
      </form>

      <!-- risultati -->
      <div th:if="${results == null || results.isEmpty()}">
        <div class="alert alert-light border">
          Nessun risultato trovato.
        </div>
      </div>

      <div th:if="${results != null && !results.isEmpty()}">
        <div class="card shadow-sm mb-3" th:each="item : ${results}">
          <div class="card-body">
            <h3 class="h4 mb-2">
              <a th:href="${item.url}"
                 th:text="${item.titolo}">Titolo</a>
            </h3>

            <p class="text-muted mb-0"
               th:if="${item.riassunto != null && !item.riassunto.isEmpty()}"
               th:text="${item.riassunto}">
              Riassunto...
            </p>
          </div>
        </div>
      </div>

    </div>
  </div>

</th:block>

</body>
</html>
