<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <title>Link non valido | J-Platform Studiodomino</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" th:href="@{/manager/assets/img/logos/favicon.ico}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/manager/assets/fonts/inter/inter.css}" />
    <link rel="stylesheet" th:href="@{/manager/assets/fonts/tabler-icons.min.css}" />
    <link rel="stylesheet" th:href="@{/manager/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/manager/assets/css/style-preset.css}" />
</head>
<body data-pc-preset="preset-1" data-pc-theme="light">

<div class="loader-bg">
    <div class="loader-track"><div class="loader-fill"></div></div>
</div>

<div class="auth-main">
    <div class="auth-wrapper v1">
        <div class="auth-form">
            <div class="card my-5">
                <div class="card-body text-center py-4">
                    <i class="ti ti-alert-circle text-danger" style="font-size:3rem;"></i>
                    <h5 class="mt-3 mb-2">Link non valido</h5>
                    <p class="text-muted small" th:text="${errore}">Link non valido o scaduto.</p>
                    <a th:href="@{/login}" class="btn btn-primary mt-2">
                        <i class="ti ti-login me-1"></i> Torna al login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/manager/assets/js/plugins/popper.min.js}"></script>
<script th:src="@{/manager/assets/js/plugins/bootstrap.min.js}"></script>
<script>
    window.addEventListener('load', function () {
        var loader = document.querySelector('.loader-bg');
        if (loader) loader.style.display = 'none';
    });
</script>
</body>
</html>
