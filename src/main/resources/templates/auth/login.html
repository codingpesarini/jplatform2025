<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <title>Login | Jplatform Studiodomino</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" th:href="@{/manager/assets/images/favicon.svg}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/manager/assets/fonts/inter/inter.css}" />
    <link rel="stylesheet" th:href="@{/manager/assets/fonts/tabler-icons.min.css}" />
    <link rel="stylesheet" th:href="@{/manager/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/manager/assets/css/style-preset.css}" />
</head>

<body data-pc-preset="preset-1" data-pc-theme="light">

<!-- Pre-loader -->
<div class="loader-bg">
    <div class="loader-track">
        <div class="loader-fill"></div>
    </div>
</div>

<div class="auth-main">
    <div class="auth-wrapper v1">
        <div class="auth-form">
            <div class="card my-5">
                <div class="card-body">
                    <div class="text-center">
                        <a href="#"><img th:src="@{/manager/assets/images/logo-dark.svg}" alt="ARDSU Logo" /></a>
                    </div>

                    <h4 class="text-center f-w-500 my-4">Accedi al Sistema ARDSU</h4>

                    <!-- Messaggio di errore -->
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <span th:text="${error}">Errore</span>
                    </div>

                    <!-- Form di login -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Inserisci username" required autofocus />
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Inserisci password" required />
                        </div>


                        <div class="d-flex mt-1 justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1" />
                                <label class="form-check-label text-muted" for="remember">Ricordami</label>
                            </div>
                            <h6 class="text-secondary f-w-400 mb-0">
                                <a href="#"> Password dimenticata? </a>
                            </h6>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Accedi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/manager/assets/js/plugins/popper.min.js}"></script>
<script th:src="@{/manager/assets/js/plugins/bootstrap.min.js}"></script>
<script th:src="@{/manager/assets/js/script.js}"></script>
</body>
</html>
