#nome dell'applicazione
spring.application.name=mini-cms 

# Database MySQL
#mySql in locale nella porta 3306 e il database × db_castellabate. evita warning inutili ed evita problemi con date/ore
spring.datasource.url=jdbc:mysql://localhost:3306/db_castellabate?useSSL=false&serverTimezone=Europe/Rome
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
#Hibernate NON deve toccare lo schema del DB
spring.jpa.hibernate.ddl-auto=none
#vedere le query in console e capire cosa fa Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#NON cambiare i nomi delle colonne e delle tabelle?
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server
server.port=8080

# ========== SITE DEFAULT (opzionale) ==========
# Se vuoi specificare un site default diverso da 1
jplatform.site.default.id=1

# ========== SESSION ==========
#Sessione dura 30 minuti
server.servlet.session.timeout=30m
#Cookie personalizzato (evita conflitti).
server.servlet.session.cookie.name=JPLATFORMSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800

# ========== LOGGING ==========
logging.level.root=INFO
#Log dettagliati solo per il progetto.
logging.level.com.studiodomino.jplatform=DEBUG
#Vedi richieste HTTP e query SQL per capire cosa succede
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=INFO
#formato leggibile dei log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== THYMELEAF ==========
#ogni modifica html × immediata
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========== FILE UPLOAD ==========
#Serve per: allegati, immagini, documenti
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB
server.tomcat.max-parts=1000

# ========== ENCODING ==========
#Serve per:accenti, caratteri, speciali, testi lunghi
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========== MAIL SMTP ==========
spring.mail.host=46.231.27.22
spring.mail.username=serviziweb@studiodomino.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

sms.gateway.url=https://gateway.skebby.it/api/send/smseasy/advanced/http.php
sms.gateway.username=studiodomino
sms.gateway.password=${SKEBBY_PASSWORD}
sms.gateway.sender=STUDIODOMIN