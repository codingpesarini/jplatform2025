spring.application.name=JPlatform

# Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/formazione2020?useSSL=false&serverTimezone=Europe/Rome
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server
server.port=8080

# ========== SITE DEFAULT (opzionale) ==========
# Se vuoi specificare un site default diverso da 1
jplatform.site.default.id=1

# ========== SESSION ==========
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=JPLATFORMSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.studiodomino.jplatform=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== THYMELEAF ==========
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========== FILE UPLOAD ==========
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ========== ENCODING ==========
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

